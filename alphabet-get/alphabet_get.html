const LY={
  hudBot:100,
  ballTop:100, ballBot:215,
  obsBTop:215, obsBBot:330,   // right→left (birds)

// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
let AC=null;
function ia(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,type='sine',v=.25,when=0){
  if(!AC)return;
  const t=AC.currentTime+when,o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+d+.01);
}
function sndShoot(){ tone(900,.04,'sine',.12); tone(1200,.06,'sine',.08,.04); }
function sndPop(){   tone(523,.06,'sine',.2); tone(659,.07,'sine',.2,.07); tone(784,.22,'sine',.2,.14); }
function sndMiss(){  tone(220,.14,'sawtooth',.3); tone(160,.22,'sawtooth',.22,.13); }
function sndBlock(){ tone(300,.1,'square',.25); tone(200,.15,'sawtooth',.2,.08); }
function sndCombo(n){ [523,659,784,1047,1319].slice(0,Math.min(n,5)).forEach((f,i)=>tone(f,.12,'sine',.18,i*.09)); }
function sndClear(){  [523,659,784,1047,1319].forEach((f,i)=>tone(f,.15,'sine',.22,i*.07)); tone(1760,.45,'sine',.22,.35); }

// ── Web Speech API 発音 ──
function speakQuestion(){
  if(!window.speechSynthesis) return;
  let text;
  if(G.screen==='boss'){
    // ボス中：今必要な文字1文字を読む
    if(!G.bossWord) return;
    text=G.bossWord.en[G.bossLetterIdx]||'';
  } else {
    const q=G.question;
    if(!q) return;
    text=G.stage===1 ? q.display : q.en;
  }
  if(!text) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.85; u.pitch=1.1; u.volume=0.9;
  window.speechSynthesis.speak(u);
}

let bgmOn=false, bgmT=null;
const MEL=[523,0,659,0,784,659,523,0,698,0,784,0,880,784,698,0,
           523,0,523,659,784,0,698,659,523,659,784,880,784,659,523,0];
function doMel(){
  if(!bgmOn||!AC)return;
  let t=AC.currentTime+.05;
  MEL.forEach((f,i)=>{ if(f) tone(f/2,.17,'triangle',.065,t+i*.22-AC.currentTime); });
  bgmT=setTimeout(doMel,(MEL.length*.22-.1)*1000);
}
function startBGM(){ if(!bgmOn&&AC){bgmOn=true;doMel();} }
function stopBGM(){ bgmOn=false; clearTimeout(bgmT); }

const WORDS=[
  {jp:'日本',en:'JAPAN'},{jp:'東京',en:'TOKYO'},{jp:'アメリカ',en:'AMERICA'},
  {jp:'ロンドン',en:'LONDON'},{jp:'パリ',en:'PARIS'},{jp:'イタリア',en:'ITALY'},
  {jp:'りんご',en:'APPLE'},{jp:'バナナ',en:'BANANA'},{jp:'オレンジ',en:'ORANGE'},
  {jp:'ねこ',en:'CAT'},{jp:'いぬ',en:'DOG'},{jp:'さかな',en:'FISH'},
  {jp:'とり',en:'BIRD'},{jp:'うさぎ',en:'RABBIT'},{jp:'くま',en:'BEAR'},
  {jp:'ほん',en:'BOOK'},{jp:'つくえ',en:'DESK'},{jp:'えんぴつ',en:'PENCIL'},
  {jp:'たいよう',en:'SUN'},{jp:'つき',en:'MOON'},{jp:'ほし',en:'STAR'},
  {jp:'みず',en:'WATER'},{jp:'そら',en:'SKY'},{jp:'くも',en:'CLOUD'},
  {jp:'かぜ',en:'WIND'},{jp:'やま',en:'MOUNTAIN'},{jp:'うみ',en:'SEA'},
];

  {jp:'ドラゴン',en:'DRAGON'},{jp:'ユニコーン',en:'UNICORN'},{jp:'フェニックス',en:'PHOENIX'},
];
const ALPHA='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const alpha='abcdefghijklmnopqrstuvwxyz';
const PAL=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9F43','#48dbfb','#ff9ff3'];

// ════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════
const rand=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rand(a,b+0.9999));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rndC=()=>PAL[ri(0,PAL.length-1)];

//  GAME STATE
// ════════════════════════════════════════════
let G={};
function resetG(){
  G={
    screen:'title',   // title|mode|playing|boss|result
    stage:1, diff:0,
    score:0, combo:0, maxCombo:0,
    timer:90, timerMax:90,
    question:null, letterIdx:0, questionDone:false,
    balloons:[], obsA:[], obsB:[],  // obsA=clouds(L→R), obsB=birds(R→L)
    arrows:[],          // active arrows in flight
    parts:[], labels:[],
    frozen:0, tick:0,
    player:{x:VW/2},
    keys:{left:false,right:false},
    bossWord:null, bossLetterIdx:0, bossHP:0, bossMaxHP:0,
    bossX:VW/2, bossY:CY.ball, bossDX:.6, bossFlash:0,
    _bossTriggered:false,
    best:[0,0], bestCombo:[0,0], unlocked:[true,false],
  };
  try{
    const sv=JSON.parse(localStorage.getItem('ag4')||'{}');
    if(sv.best) G.best=sv.best;
    if(sv.bestCombo) G.bestCombo=sv.bestCombo;
    if(sv.unlocked) G.unlocked=sv.unlocked;
  }catch(e){}
}
resetG();
function saveG(){
  try{ localStorage.setItem('ag4',JSON.stringify({best:G.best,bestCombo:G.bestCombo,unlocked:G.unlocked})); }catch(e){}
}

// ════════════════════════════════════════════
//  BALLOONS
// ════════════════════════════════════════════
function mkBalloon(letter, targetX, delay=0){
  const baseY=rand(LY.ballTop+28, LY.ballBot-28);
  // 目標Xに近い端から入ってくる
  const startX=targetX<VW/2 ? -55 : VW+55;
  return {
    letter, x:startX, targetX, baseY, y:baseY,
    color:rndC(), r:23,
    driftVx:rand(-.22,.22),   // 到着後のゆっくり漂い
    phase:rand(0,Math.PI*2), spd:rand(.009,.018),
    alpha:0, scale:1,
    popped:false, exiting:false, dead:false,
    arrived:false, delay,
  };
}

// ── 風船1個を画面端から追加 ──
function addBalloonFromSide(letter, delay=0){
  // 既存と重ならないx座標を探す
  const live=G.balloons.filter(b=>!b.dead);
  let tx;
  for(let t=0;t<30;t++){
    tx=rand(42,VW-42);
    if(live.every(b=>Math.abs((b.targetX??b.x)-tx)>52)) break;
  }
  G.balloons.push(mkBalloon(letter, tx??rand(42,VW-42), delay));
}

// ── Stage1: プールの補充（少なくなったら端から追加） ──
const POOL_TARGET=7, POOL_MIN=3;
function refillPool(){
  const live=G.balloons.filter(b=>!b.popped&&!b.exiting&&!b.dead);
  if(live.length>=POOL_MIN) return;
  const have=new Set(G.balloons.filter(b=>!b.dead&&!b.exiting).map(b=>b.letter.toLowerCase()));
  const pool=alpha.split('').filter(l=>!have.has(l));
  const toAdd=Math.min(POOL_TARGET-live.length, pool.length);
  for(let i=0;i<toAdd;i++){
    const idx=ri(0,pool.length-1);
    addBalloonFromSide(pool[idx], i*0.15);
    pool.splice(idx,1);
  }
}

// ── Stage2/Boss: 総入れ替え（端から順に入場） ──
function spreadBalloons(letters){
  G.balloons.forEach(b=>{
    if(!b.popped&&!b.exiting){ b.exiting=true; b.exitDir=b.x<VW/2?-1:1; }
  });
  const n=letters.length;
  const step=(VW-80)/(n-1||1);
  const xs=letters.map((_,i)=>clamp(40+i*step+rand(-10,10),38,VW-38));
  letters.forEach((l,i)=> G.balloons.push(mkBalloon(l, xs[i], i*0.09)));
}

function fillBalloons(){
  const usedSet=new Set();
  if(G.screen==='boss'){
    const needed=G.bossWord.en[G.bossLetterIdx].toLowerCase();
    usedSet.add(needed);
    const pool=alpha.split('').filter(l=>l!==needed);
    while(usedSet.size<5) usedSet.add(pool[ri(0,pool.length-1)]);
    spreadBalloons([...usedSet]);
  } else {
    // Stage 2
    const needed=G.question.answer[G.letterIdx].toLowerCase();
    usedSet.add(needed);
    const pool=alpha.split('').filter(l=>l!==needed);
    while(usedSet.size<5) usedSet.add(pool[ri(0,pool.length-1)]);
    spreadBalloons([...usedSet]);
  }
}

// ════════════════════════════════════════════
//  OBSTACLES
// ════════════════════════════════════════════
// obsB = birds, move right→left, in OBS-B band
// obsA = clouds, move left→right, in OBS-A band
// 夜空なので障害物は雲のみ
const CLOUD_EMOJIS=['☁️','☁️','☁️','🌫️'];

// ── Weapon / difficulty definitions ───────────────
const WEAPONS=[
  {id:'rocket', name:'🚀 ロケットアーム',   tag:'速い・まっすぐ',      color:'#FF6B6B', vy:-14},
  {id:'rope',   name:'🤠 カウボーイロープ',  tag:'遅い・弧を描く',      color:'#FFD93D', vy:-5 },
  {id:'net',    name:'🎯 ネットランチャー',  tag:'広範囲・誤答も注意',  color:'#4D96FF', vy:-9 },
  {id:'bugnet', name:'🦋 超ロング虫取り網', tag:'ゆっくり・障害物失敗', color:'#6BCB77', vy:-2 },
  {id:'chaos',  name:'⚡ カオスモード',      tag:'誤答→障害物が増殖',  color:'#C77DFF', vy:-10},
];
const PERM_OBS_EMOJIS=['☁️','🐦‍⬛','🛸','🌪️','💥','✈️'];

function spawnPermObs(){
  const y=rand(LY.obsBTop+20, LY.obsABot-20);
  const x=rand(36, VW-36);
  G.permObs.push({e:PERM_OBS_EMOJIS[ri(0,PERM_OBS_EMOJIS.length-1)], x, y, w:46, h:40});
  spawnLabel(VW/2, LY.obsABot-10,'⚠️ 障害物増加！','#C77DFF',20);
}
function isCorrectBalloon(b){
  if(G.screen==='boss') return b.letter.toLowerCase()===(G.bossWord?.en[G.bossLetterIdx]||'').toLowerCase();
  if(G.stage===1) return b.letter===G.question?.answer;
  return b.letter.toLowerCase()===(G.question?.answer[G.letterIdx]||'').toLowerCase();
}
function netCapture(netX, netY, radius){
  const alive=G.balloons.filter(b=>!b.popped);
  const caught=alive.filter(b=>Math.hypot(b.x-netX, b.y-netY)<radius);
  if(caught.length===0) return;
  const rights=caught.filter(b=>isCorrectBalloon(b));
  const wrongs=caught.filter(b=>!isCorrectBalloon(b));
  for(const b of wrongs){
    b.popped=true;
    spawnParts(b.x,b.y,'#aaa',6);
    G.combo=0; G._lastCorrectTime=0;
    G.score-=50;
    spawnLabel(b.x,b.y-20,'-50','#FF6B6B',18);
  }
  if(wrongs.length>0){ sndMiss(); G.frozen=0.8; }
  if(rights.length>0){
    onBalloonHit(rights[0]);
  } else if(!G.questionDone){
    if(G.stage===1){ setTimeout(nextQuestion,800); }
    else { setTimeout(fillBalloons,700); }
  }
}

function makeObstacleSet(n, speed, cy, emojis){
  // Spread n obstacles with gaps; speed > 0 = left→right, < 0 = right→left
  const objs=[];
  const spacing=VW/n;
  for(let i=0;i<n;i++){
    objs.push({
      x: i*spacing + rand(10, spacing-30),
      y: cy + rand(-18,18),
      vx: speed,
      emoji: emojis[ri(0,emojis.length-1)],
      w:40, h:30,
    });
  }
  return objs;
}

function initObstacles(){
  const spd=0.8+G.diff*0.22;          // L1:0.8 → L5:1.7
  const cnt=2+Math.floor(G.diff/2);   // L1:2 L2:2 L3:3 L4:3 L5:4
  G.obsB = makeObstacleSet(cnt,               -(spd+0.2), CY.obsB, CLOUD_EMOJIS); // 雲・右→左
  G.obsA = makeObstacleSet(Math.max(1,cnt-2),  spd,        CY.obsA, CLOUD_EMOJIS); // 雲・左→右
}

// ════════════════════════════════════════════
//  ARROWS
// ════════════════════════════════════════════
function _spawnWeapon(px){
  const w=WEAPONS[G.diff];
  G.arrows.push({
    x:px, startX:px, y:LY.aimBot-10,
    vy:w.vy, age:0,
    weapon:w.id,
    done:false, trail:[],
    netR:0,
  });
  sndShoot();
}
function fireArrow(){
  if(G.frozen>0) return;
  if(G.questionDone && G.screen!=='boss') return;
  if(G.arrows.some(a=>!a.done)) return;
  if(G._charging) return;
  const px=G.player.x;
  if(WEAPONS[G.diff].id==='rope'){
    G._charging=true; G._chargeTimer=0.35;
    return;
  }
  _spawnWeapon(px);
}

// ════════════════════════════════════════════
//  EFFECTS
// ════════════════════════════════════════════
function spawnParts(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2), s=rand(2.5,8);
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color,r:rand(3,8),life:1,decay:rand(.016,.038)});
  }
}
function spawnLabel(x,y,text,color,sz=22){
  G.labels.push({x,y,text,color,sz,life:1,decay:.02,vy:-1.6});
}

// ════════════════════════════════════════════
//  CAPTURE LOGIC
// ════════════════════════════════════════════
function addScore(pts){ G.score+=Math.round(pts); }
function incCombo(){
  const now=Date.now();
  const bonus=(G._lastCorrectTime && now-G._lastCorrectTime<3000);
  G._lastCorrectTime=now;
  G.combo++; if(G.combo>G.maxCombo) G.maxCombo=G.combo;
  if(bonus){ addScore(10); sndCombo(3); spawnLabel(VW/2,340,'+10 COMBO!','#4D96FF',24); }
}

function onBalloonHit(balloon){
  balloon.popped=true;
  let correct=false;

  if(G.screen==='boss'){
    const need=G.bossWord.en[G.bossLetterIdx].toLowerCase();
    correct=(balloon.letter.toLowerCase()===need);
    if(correct){
      spawnParts(balloon.x,balloon.y,balloon.color,18);
      sndPop();
      G.bossLetterIdx++;
      if(G.bossLetterIdx>=G.bossWord.en.length){
        // Word complete → damage boss
        G.bossHP=Math.max(0,G.bossHP-1);
        G.bossFlash=0.55;
        addScore(30); incCombo();
        spawnLabel(VW/2,280,'⚔️ HIT!','#FFD93D',26);
        spawnParts(G.bossX,G.bossY,rndC(),22);
        if(G.bossHP<=0){
          sndClear();
          addScore(100);
          spawnLabel(VW/2,260,'👑 BOSS CLEAR!! +100','#FFD93D',28);
          setTimeout(endGame,2000);
          return;
        }
        G.bossLetterIdx=0;
        G.bossWord=BOSS_WORDS[ri(0,BOSS_WORDS.length-1)];
        setTimeout(fillBalloons,600);
      } else {
        addScore(10); incCombo();
        spawnLabel(balloon.x,balloon.y-35,'✓ +10','#6BCB77',20);
        setTimeout(fillBalloons,450);
      }
    } else {
      wrongHit(balloon.x, balloon.y);
      setTimeout(fillBalloons,650);
    }
    return;
  }

  // Stage 1（プール制：風船はそのまま、問題だけ次へ）
  if(G.stage===1){
    correct=(balloon.letter===G.question.answer);
    if(correct){
      spawnParts(balloon.x,balloon.y,balloon.color,16);
      sndPop();
      const pts=10;
      addScore(pts); incCombo();
      spawnLabel(balloon.x,balloon.y-35,'+'+pts,balloon.color,24);
      G.questionDone=true;
      setTimeout(nextQuestion,600); // 残りの風船から次の問題を出す
    } else {
      wrongHit(balloon.x,balloon.y);
      // 不正解で割れた風船もなくなる→refillPoolが補充
    }
    return;
  }

  // Stage 2
  correct=(balloon.letter.toLowerCase()===G.question.answer[G.letterIdx].toLowerCase());
  if(correct){
    spawnParts(balloon.x,balloon.y,balloon.color,14);
    sndPop();
    G.letterIdx++;
    spawnLabel(balloon.x,balloon.y-35,'✓ '+balloon.letter.toUpperCase(),'#6BCB77',22);
    if(G.letterIdx>=G.question.answer.length){
      const pts=10*G.question.answer.length;
      addScore(pts); incCombo();
      sndClear();
      spawnLabel(VW/2,310,'WORD CLEAR! +'+pts,'#FFD93D',26);
      G.questionDone=true;
      setTimeout(nextQuestion,1100);
    } else {
      addScore(10); incCombo();
      setTimeout(fillBalloons,450);
    }
  } else {
    wrongHit(balloon.x,balloon.y);
    setTimeout(fillBalloons,700);
  }
}

function wrongHit(x,y){
  G.combo=0; G._lastCorrectTime=0;
  G.score-=50;
  sndMiss();
  spawnLabel(x,y-30,'-50 ✗','#FF6B6B',22);
  if(G.diff===4) spawnPermObs();
  // 誤答記録（復習用）
  if(G.screen==='boss' && G.bossWord){
    const key=G.bossWord.en[G.bossLetterIdx]||'';
    if(key && !G._wrongSet.has(key)){
      G._wrongSet.add(key);
      G.wrongAnswers.push({display:key.toUpperCase(), answer:key.toLowerCase(), en:key});
    }
  } else if(G.question){
    const key=G.stage===1 ? G.question.answer : (G.question.answer[G.letterIdx]||'');
    const disp=G.stage===1 ? G.question.display : key.toUpperCase();
    if(key && !G._wrongSet.has(key)){
      G._wrongSet.add(key);
      G.wrongAnswers.push({display:disp, answer:key, en:key});
    }
  }
  G.frozen=1.3;
}

// ════════════════════════════════════════════
//  QUESTIONS
// ════════════════════════════════════════════
const usedS1=new Set(), usedS2=new Set();
function nextQuestion(){
  G.letterIdx=0; G.questionDone=false;

  if(G.stage===1){
    // プール内の生きている風船から次の問題を選ぶ
    const live=G.balloons.filter(b=>!b.popped&&!b.exiting&&!b.dead);
    let candidates=live.filter(b=>!usedS1.has(b.letter.toLowerCase()));
    if(candidates.length===0){ usedS1.clear(); candidates=live; }
    if(candidates.length===0){
      // プールが空なら補充してから少し待つ
      refillPool();
      setTimeout(nextQuestion,500);
      return;
    }
    // プレイヤーから最も遠い風船を出題（左右に動かないと正解できない）
    candidates.sort((a,b)=>Math.abs(b.x-G.player.x)-Math.abs(a.x-G.player.x));
    const chosen=candidates[0];
    usedS1.add(chosen.letter.toLowerCase());
    G.question={display:chosen.letter.toUpperCase(), answer:chosen.letter.toLowerCase()};
    speakQuestion();
    // プールが少なければ補充
    refillPool();
  } else {
    if(usedS2.size>=WORDS.length) usedS2.clear();
    let w; do{ w=WORDS[ri(0,WORDS.length-1)]; }while(usedS2.has(w.en));
    usedS2.add(w.en);
    G.question={jp:w.jp, en:w.en, answer:w.en};
    speakQuestion();
    fillBalloons();
  }
}

// ════════════════════════════════════════════
//  GAME FLOW
// ════════════════════════════════════════════
function startGame(){
  G.timer=90; G.timerMax=90;
  G.score=0; G.combo=0; G.maxCombo=0;
  G.balloons=[]; G.arrows=[]; G.parts=[]; G.labels=[]; G.permObs=[];
  G.frozen=0; G.tick=0; G._bossTriggered=false; G._lastCorrectTime=0;
  G._speakTimer=0; G._charging=false; G._chargeTimer=0;
  G.wrongAnswers=[]; G._wrongSet=new Set();
  G.player={x:VW/2}; G.keys={left:false,right:false};
  usedS1.clear(); usedS2.clear();
  initObstacles();

  if(G.stage===1){
    // Stage1: まず風船プールを作ってから問題を選ぶ
    const letters=[...alpha].sort(()=>Math.random()-.5).slice(0,POOL_TARGET);
    letters.forEach((l,i)=>addBalloonFromSide(l, i*0.1));
    setTimeout(nextQuestion, 300); // 風船が登場し始めてから出題
  } else {
    nextQuestion();
  }

  G.screen='playing';
  startBGM();
}

function startBoss(){
  G.screen='boss';
  G.bossWord=BOSS_WORDS[ri(0,BOSS_WORDS.length-1)];
  G.bossLetterIdx=0; G.bossHP=5; G.bossMaxHP=5;
  G.bossX=VW/2; G.bossY=CY.ball; G.bossDX=.6; G.bossFlash=0;
  G.arrows=[];
  setTimeout(fillBalloons,500);
}

function endGame(){
  stopBGM();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  const si=G.stage-1;
  if(G.score>G.best[si]) G.best[si]=G.score;
  if(G.maxCombo>G.bestCombo[si]) G.bestCombo[si]=G.maxCombo;
  if(G.stage===1 && G.score>=30) G.unlocked[1]=true;
  saveG();
  // 復習セットアップ
  G._reviewIdx=-1; G._reviewTimer=0.8; G._reviewActive=G.wrongAnswers.length>0;
  G.screen='result';
}
function _reviewSpeak(item){
  if(!window.speechSynthesis||!item) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(item.en);
  u.lang='en-US'; u.rate=0.75; u.pitch=1.1; u.volume=1.0;
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════
function update(dt){
  G.tick+=dt;
  const playing=G.screen==='playing'||G.screen==='boss';

  if(playing){
    if(G.frozen>0){ G.frozen-=dt; goto_effects(dt); return; }

    // Timer & boss trigger
    if(G.screen==='playing'||G.screen==='boss'){
      G.timer-=dt;
      if(G.timer<=0){ G.timer=0; endGame(); return; }
      if(G.stage===1 && G.score>=100 && !G._bossTriggered){
        G._bossTriggered=true;
        startBoss(); return;
      }
    }

    // 2秒ごとに発音
    if(G.question){
      G._speakTimer=(G._speakTimer||0)+dt;
      if(G._speakTimer>=2){ G._speakTimer=0; speakQuestion(); }
    }

    // Stage1: プール補充チェック
    if(G.screen==='playing' && G.stage===1) refillPool();

    // Player movement
    const SPD=5.0;
    if(G.keys.left)  G.player.x=clamp(G.player.x-SPD, 28, VW-28);
    if(G.keys.right) G.player.x=clamp(G.player.x+SPD, 28, VW-28);

    // Balloons: entry / drift / exit
    for(const b of G.balloons){
      // 割れた風船：弾けて消える
      if(b.popped){ b.scale+=.07; b.alpha=Math.max(0,b.alpha-.09); continue; }
      // 退場中：端へ流れて消える
      if(b.exiting){
        b.x+=b.exitDir*3.5;
        b.alpha=Math.max(0,b.alpha-0.045);
        if(b.alpha<=0) b.dead=true;
        continue;
      }
      // 登場ディレイ
      if(b.delay>0){ b.delay-=dt; continue; }
      // フェードイン
      b.alpha=Math.min(1,b.alpha+.07);
      // 目標X位置へスライドイン
      if(!b.arrived){
        const dx=b.targetX-b.x;
        if(Math.abs(dx)<3){ b.x=b.targetX; b.arrived=true; }
        else { b.x+=Math.sign(dx)*Math.min(Math.abs(dx)*.13+1.8, 5); }
      } else {
        // 到着後：ゆっくり漂う
        b.x+=b.driftVx;
        if(b.x<36||b.x>VW-36) b.driftVx*=-1;
        b.x=clamp(b.x,36,VW-36);
      }
      b.y=b.baseY+Math.sin(G.tick*.75+b.phase)*9;
    }
    G.balloons=G.balloons.filter(b=>!b.dead&&(!b.popped||b.alpha>0.01));

    // Obstacles scroll – wrap around
    for(const o of G.obsA){ // clouds, left→right
      o.x+=o.vx;
      if(o.x>VW+50) o.x=-50;
    }
    for(const o of G.obsB){ // birds, right→left
      o.x+=o.vx;
      if(o.x<-50) o.x=VW+50;
    }

    // Rope charge countdown
    if(G._charging){
      G._chargeTimer-=dt;
      if(G._chargeTimer<=0){ G._charging=false; _spawnWeapon(G.player.x); }
    }

    // Arrows
    for(const ar of G.arrows){
      if(ar.done) continue;
      ar.age+=dt;
      ar.trail.push({x:ar.x, y:ar.y});
      if(ar.trail.length>14) ar.trail.shift();
      ar.y+=ar.vy;

      // Rope: sinusoidal swing
      if(ar.weapon==='rope'){
        ar.x=ar.startX+Math.sin(ar.age*5)*30;
        ar.x=Math.max(10,Math.min(VW-10,ar.x));
      }

      // Net: freeze in balloon band and expand
      if(ar.weapon==='net' && ar.y<=LY.ballBot+10 && ar.y>=LY.ballTop-20){
        ar.vy=0; ar.netR+=5;
        if(ar.netR>=70){ ar.done=true; netCapture(ar.x,ar.y,ar.netR); }
        continue;
      }

      // ── Permanent obstacle collision
      for(const po of G.permObs){
        if(Math.abs(ar.x-po.x)<po.w/2+4 && Math.abs(ar.y-po.y)<po.h/2+6){
          ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#C77DFF',8);
          if(ar.weapon==='bugnet'){ spawnLabel(ar.x,ar.y-10,'虫取り失敗！','#6BCB77',18); }
          else { spawnLabel(ar.x,ar.y-10,'ブロック！ -30','#FFD93D',18); G.frozen=0.7; G.combo=0; G.score-=30; if(G.diff===4) spawnPermObs(); }
          break;
        }
      }
      if(ar.done) continue;

      // ── Collision: OBS-B band (clouds, right→left)
      if(ar.y>=LY.obsBTop-6 && ar.y<=LY.obsBBot+6){
        for(const o of G.obsB){
          if(Math.abs(ar.x-o.x)<o.w/2+4){
            ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#aaa',8);
            if(ar.weapon==='bugnet'){ spawnLabel(ar.x,ar.y-10,'虫取り失敗！','#6BCB77',18); }
            else { spawnLabel(ar.x,ar.y-10,'ぶつかった！ -30','#FF6B6B',18); G.frozen=0.7; G.combo=0; G.score-=30; if(G.diff===4) spawnPermObs(); }
            break;
          }
        }
      }
      if(ar.done) continue;

      // ── Collision: OBS-A band (clouds, left→right)
      if(ar.y>=LY.obsATop-6 && ar.y<=LY.obsABot+6){
        for(const o of G.obsA){
          if(Math.abs(ar.x-o.x)<o.w/2+4){
            ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#aaa',8);
            if(ar.weapon==='bugnet'){ spawnLabel(ar.x,ar.y-10,'虫取り失敗！','#6BCB77',18); }
            else { spawnLabel(ar.x,ar.y-10,'ブロック！ -30','#FFD93D',18); G.frozen=0.7; G.combo=0; G.score-=30; if(G.diff===4) spawnPermObs(); }
            break;
          }
        }
      }
      if(ar.done) continue;

      // ── Balloon band: hit nearest (non-net weapons)
      if(ar.weapon!=='net' && ar.y<=LY.ballBot && ar.y>=LY.ballTop-16){
        const alive=G.balloons.filter(b=>!b.popped);
        if(alive.length>0){
          const near=alive.reduce((a,b)=>Math.abs(a.x-ar.x)<Math.abs(b.x-ar.x)?a:b);
          if(Math.abs(near.x-ar.x)<near.r+10){ ar.done=true; onBalloonHit(near); continue; }
        }
        if(ar.y<LY.ballTop-20) ar.done=true;
      }

      if(ar.y<LY.ballTop-30) ar.done=true;
    }
    G.arrows=G.arrows.filter(a=>!a.done);

    // Boss movement
    if(G.screen==='boss'){
      G.bossX+=G.bossDX;
      if(G.bossX<70||G.bossX>VW-70) G.bossDX*=-1;
      if(G.bossFlash>0) G.bossFlash-=dt;
    }
  }

  goto_effects(dt);
}

function goto_effects(dt){
  for(const p of G.parts){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.vx*=.97; p.life-=p.decay;
  }
  G.parts=G.parts.filter(p=>p.life>0);
  for(const l of G.labels){ l.y+=l.vy; l.life-=l.decay; }
  G.labels=G.labels.filter(l=>l.life>0);
  // 復習アニメーション
  if(G.screen==='result' && G._reviewActive && G.wrongAnswers.length>0){
    G._reviewTimer-=dt;
    if(G._reviewTimer<=0){
      G._reviewIdx=(G._reviewIdx+1)%G.wrongAnswers.length;
      G._reviewTimer=2.2;
      _reviewSpeak(G.wrongAnswers[G._reviewIdx]);
    }
  }
}

// ════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════
function RR(x,y,w,h,r=8){ cx.beginPath(); cx.roundRect(x,y,w,h,r); }
function T(s,x,y,font,col,align='center',base='middle'){
  cx.font=font; cx.fillStyle=col; cx.textAlign=align; cx.textBaseline=base; cx.fillText(s,x,y);
}
function SH(col,blur){ cx.shadowColor=col; cx.shadowBlur=blur; }
function NSH(){ cx.shadowBlur=0; }
function BTN(x,y,w,h,label,bg,fg='#fff',r=10){
  cx.fillStyle=bg; RR(x-w/2,y-h/2,w,h,r); cx.fill();
  cx.fillStyle=fg; cx.font=`bold ${Math.max(13,Math.floor(h*.38))}px Arial`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(label,x,y);
}
function IB(px,py,x,y,w,h){ return px>x-w/2&&px<x+w/2&&py>y-h/2&&py<y+h/2; }
function IR(px,py,x,y,w,h){ return px>=x&&px<=x+w&&py>=y&&py<=y+h; }

// ════════════════════════════════════════════
//  DRAW: BACKGROUND + LAYERS
// ════════════════════════════════════════════
function drawBG(){
  // Deep sky gradient
  const gr=cx.createLinearGradient(0,0,0,VH);
  gr.addColorStop(0,'#06091f');
  gr.addColorStop(.3,'#0b1e52');
  gr.addColorStop(.65,'#1a3a7a');
  gr.addColorStop(1,'#0d1b3e');
  cx.fillStyle=gr; cx.fillRect(0,0,VW,VH);

  // Stars (only in balloon area and above)
  for(let i=0;i<40;i++){
    const sx=(i*137.5)%VW, sy=(i*79.3)%(LY.ballBot+20);
    const t=Math.sin(G.tick*1.4+i)*.5+.5;
    cx.globalAlpha=.1+t*.5; cx.fillStyle='#fff';
    cx.beginPath(); cx.arc(sx,sy,.6+t*.7,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;

  // ── Layer bands ──
  // Balloon layer: light blue tint
  const gBall=cx.createLinearGradient(0,LY.ballTop,0,LY.ballBot);
  gBall.addColorStop(0,'rgba(40,80,160,.18)');
  gBall.addColorStop(1,'rgba(20,50,120,.06)');
  cx.fillStyle=gBall; cx.fillRect(0,LY.ballTop,VW,LY.ballBot-LY.ballTop);

  // OBS-B layer (birds, R→L): warm red tint
  const gObsB=cx.createLinearGradient(0,LY.obsBTop,0,LY.obsBBot);
  gObsB.addColorStop(0,'rgba(180,40,40,.08)');
  gObsB.addColorStop(1,'rgba(120,20,20,.04)');
  cx.fillStyle=gObsB; cx.fillRect(0,LY.obsBTop,VW,LY.obsBBot-LY.obsBTop);

  // OBS-A layer (clouds, L→R): amber tint
  const gObsA=cx.createLinearGradient(0,LY.obsATop,0,LY.obsABot);
  gObsA.addColorStop(0,'rgba(160,120,30,.08)');
  gObsA.addColorStop(1,'rgba(100,70,10,.04)');
  cx.fillStyle=gObsA; cx.fillRect(0,LY.obsATop,VW,LY.obsABot-LY.obsATop);

  // Layer separator lines
  cx.strokeStyle='rgba(255,255,255,.1)'; cx.lineWidth=1;
  [LY.ballTop,LY.ballBot,LY.obsBBot,LY.obsABot].forEach(y=>{
    cx.beginPath(); cx.moveTo(0,y); cx.lineTo(VW,y); cx.stroke();
  });

  // Layer direction indicators
  cx.fillStyle='rgba(255,255,255,.18)'; cx.font='10px Arial';
  cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText('← 鳥', 6, CY.obsB);
  cx.fillText('雲 →', 6, CY.obsA);
  cx.textAlign='right';
  cx.fillText('🎈 バルーン', VW-6, LY.ballTop+12);
}

// ════════════════════════════════════════════
//  DRAW: BALLOONS
// ════════════════════════════════════════════
function drawBalloons(){
  for(const b of G.balloons){
    if(b.alpha<.01) continue;
    cx.save();
    cx.globalAlpha=b.alpha;
    cx.translate(b.x, b.y);
    cx.scale(b.scale, b.scale);

    // String
    cx.strokeStyle='rgba(255,255,255,.25)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(0, b.r+2); cx.lineTo(rand(-3,3), b.r+20); cx.stroke();

    // Body (ellipse)
    const gr=cx.createRadialGradient(-b.r*.3,-b.r*.4,1,0,0,b.r);
    gr.addColorStop(0,b.color+'ee'); gr.addColorStop(1,b.color+'44');
    SH(b.color,16);
    cx.beginPath(); cx.ellipse(0,-2,b.r,b.r*1.12,0,0,Math.PI*2);
    cx.fillStyle=gr; cx.fill();
    NSH();
    cx.strokeStyle='rgba(255,255,255,.28)'; cx.lineWidth=1.5; cx.stroke();

    // Shine
    cx.beginPath(); cx.ellipse(-b.r*.32,-b.r*.52,b.r*.2,b.r*.14,-.4,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,.32)'; cx.fill();

    // Letter
    SH('#000',5);
    T(b.letter,0,-2,`bold ${b.r*.95}px 'Segoe UI',Arial`,'#fff');
    NSH();
    cx.restore();
  }
}

// ════════════════════════════════════════════
//  DRAW: AIM LINE + ARROWS
// ════════════════════════════════════════════
function drawAimLine(){
  const px=G.player.x;
  const hasActive=G.arrows.some(a=>!a.done);
  if(hasActive) return;
  cx.save();
  cx.setLineDash([4,7]); cx.lineWidth=1;
  // Color the aim line based on obstacle proximity
  let danger=false;
  for(const o of [...G.obsA,...G.obsB]){
    if(Math.abs(o.x-px)<o.w/2+8){ danger=true; break; }
  }
  cx.strokeStyle=danger?'rgba(255,80,80,.35)':'rgba(255,255,255,.22)';
  cx.beginPath(); cx.moveTo(px,LY.aimBot); cx.lineTo(px,LY.ballTop+10);
  cx.stroke();
  cx.setLineDash([]);
  cx.restore();
}

function drawArrows(){
  for(const ar of G.arrows){
    if(ar.done) continue;
    const w=WEAPONS[G.diff]||WEAPONS[0];
    cx.save();

    // Net expanding circle
    if(ar.weapon==='net' && ar.netR>0){
      cx.globalAlpha=0.55; cx.strokeStyle='#4D96FF'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(ar.x,ar.y,ar.netR,0,Math.PI*2); cx.stroke();
      cx.globalAlpha=0.12; cx.fillStyle='#4D96FF'; cx.fill();
      // Grid lines
      cx.globalAlpha=0.4; cx.lineWidth=1.5;
      for(let a=0;a<Math.PI;a+=Math.PI/3){
        cx.beginPath(); cx.moveTo(ar.x+Math.cos(a)*ar.netR,ar.y+Math.sin(a)*ar.netR);
        cx.lineTo(ar.x-Math.cos(a)*ar.netR,ar.y-Math.sin(a)*ar.netR); cx.stroke();
      }
      cx.globalAlpha=1; cx.restore(); continue;
    }

    // Trail
    for(let i=0;i<ar.trail.length;i++){
      const t=ar.trail[i];
      cx.globalAlpha=(i/ar.trail.length)*.5;
      cx.fillStyle=w.color;
      cx.beginPath(); cx.arc(t.x,t.y,ar.weapon==='bugnet'?3.5:2,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1;

    if(ar.weapon==='rocket'){
      SH(w.color,12);
      cx.strokeStyle=w.color; cx.lineWidth=3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x,ar.y+14); cx.lineTo(ar.x,ar.y); cx.stroke();
      cx.fillStyle=w.color;
      cx.beginPath(); cx.moveTo(ar.x,ar.y-14); cx.lineTo(ar.x-5,ar.y); cx.lineTo(ar.x+5,ar.y); cx.closePath(); cx.fill();
      NSH();
    } else if(ar.weapon==='rope'){
      SH(w.color,8);
      cx.strokeStyle=w.color; cx.lineWidth=2.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+8,ar.y+20); cx.quadraticCurveTo(ar.x+16,ar.y+8,ar.x,ar.y); cx.stroke();
      cx.beginPath(); cx.arc(ar.x,ar.y-8,7,0,Math.PI*2); cx.stroke();
      NSH();
    } else if(ar.weapon==='bugnet'){
      SH(w.color,10);
      cx.strokeStyle=w.color; cx.lineWidth=3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+2,ar.y+30); cx.lineTo(ar.x-1,ar.y-10); cx.stroke();
      cx.beginPath(); cx.ellipse(ar.x,ar.y-22,13,6,0,0,Math.PI*2); cx.stroke();
      cx.lineWidth=1.5; cx.globalAlpha=0.6;
      cx.beginPath(); cx.moveTo(ar.x-13,ar.y-22); cx.lineTo(ar.x,ar.y-10); cx.lineTo(ar.x+13,ar.y-22); cx.stroke();
      cx.globalAlpha=1; NSH();
    } else if(ar.weapon==='chaos'){
      SH(w.color,14);
      cx.strokeStyle=w.color; cx.lineWidth=3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x,ar.y+14); cx.lineTo(ar.x,ar.y); cx.stroke();
      cx.fillStyle=w.color;
      cx.beginPath(); cx.moveTo(ar.x,ar.y-14); cx.lineTo(ar.x-5,ar.y); cx.lineTo(ar.x+5,ar.y); cx.closePath(); cx.fill();
      for(let i=0;i<4;i++){
        const a=(ar.age||0)*8+i*Math.PI/2;
        cx.globalAlpha=0.55; cx.beginPath(); cx.arc(ar.x+Math.cos(a)*9,ar.y+Math.sin(a)*9,2.5,0,Math.PI*2); cx.fill();
      }
      cx.globalAlpha=1; NSH();
    } else {
      // fallback: standard arrow
      SH(w.color,10);
      cx.strokeStyle=w.color; cx.lineWidth=3;
      cx.beginPath(); cx.moveTo(ar.x,ar.y+14); cx.lineTo(ar.x,ar.y); cx.stroke();
      cx.fillStyle=w.color;
      cx.beginPath(); cx.moveTo(ar.x,ar.y-14); cx.lineTo(ar.x-5,ar.y); cx.lineTo(ar.x+5,ar.y); cx.closePath(); cx.fill();
      NSH();
    }
    cx.restore();
  }
}

function drawPlayer(){
  const px=G.player.x;

  // Aim indicator on ground
  cx.fillStyle='rgba(255,220,50,.15)';
  cx.beginPath(); cx.ellipse(px, LY.playerY+22, 28, 7, 0, 0, Math.PI*2); cx.fill();

  // 武器の道具を描画
  cx.save();
  cx.translate(px, LY.playerY);
  const wep=WEAPONS[G.diff]||WEAPONS[0];
  SH(wep.color,10);
  cx.lineCap='round';
  if(wep.id==='rocket'){
    cx.strokeStyle=wep.color; cx.lineWidth=4;
    cx.beginPath(); cx.arc(0,0,22,Math.PI*.65,Math.PI*1.35,false); cx.stroke();
    cx.strokeStyle='rgba(255,255,255,.7)'; cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(Math.cos(Math.PI*.65)*22,Math.sin(Math.PI*.65)*22);
    cx.lineTo(Math.cos(Math.PI*1.35)*22,Math.sin(Math.PI*1.35)*22);
    cx.stroke();
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(0,18); cx.lineTo(0,-18); cx.stroke();
    cx.fillStyle=wep.color;
    cx.beginPath(); cx.moveTo(0,-26); cx.lineTo(-5,-16); cx.lineTo(5,-16); cx.closePath(); cx.fill();
  } else if(wep.id==='rope'){
    const sw=Math.sin(G.tick*3)*0.4;
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(6,18); cx.quadraticCurveTo(16+Math.sin(G.tick*2)*6,-4,Math.cos(sw)*18,-18); cx.stroke();
    cx.beginPath(); cx.ellipse(Math.cos(sw)*18,-18,10,5,sw,0,Math.PI*2); cx.stroke();
    // Show charging indicator
    if(G._charging){
      const cp=1-(G._chargeTimer/0.35);
      cx.fillStyle=wep.color; cx.globalAlpha=cp;
      cx.beginPath(); cx.arc(0,0,24*cp,0,Math.PI*2); cx.fill();
      cx.globalAlpha=1;
    }
  } else if(wep.id==='net'){
    cx.strokeStyle=wep.color; cx.lineWidth=4;
    cx.beginPath(); cx.moveTo(-8,20); cx.lineTo(8,20); cx.lineTo(6,-14); cx.lineTo(-6,-14); cx.closePath(); cx.stroke();
    cx.beginPath(); cx.arc(0,-22,9,0,Math.PI*2); cx.stroke();
    cx.lineWidth=1.5;
    cx.beginPath(); cx.moveTo(-9,-22); cx.lineTo(9,-22); cx.moveTo(0,-31); cx.lineTo(0,-13); cx.stroke();
  } else if(wep.id==='bugnet'){
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(2,30); cx.lineTo(-1,-22); cx.stroke();
    cx.beginPath(); cx.ellipse(0,-28,14,6,0,0,Math.PI*2); cx.stroke();
    cx.lineWidth=1.5; cx.globalAlpha=0.65;
    cx.beginPath(); cx.moveTo(-14,-28); cx.lineTo(0,-14); cx.lineTo(14,-28); cx.stroke();
    cx.globalAlpha=1;
  } else if(wep.id==='chaos'){
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(0,22); cx.lineTo(0,-8); cx.stroke();
    for(let i=0;i<6;i++){
      const a=(G.tick*4)+i*Math.PI/3;
      const r=16+Math.sin(G.tick*6+i)*4;
      cx.lineWidth=2; cx.globalAlpha=0.55+Math.sin(G.tick*5+i)*.35;
      cx.beginPath(); cx.moveTo(0,-8); cx.lineTo(Math.cos(a)*r,-8+Math.sin(a)*r); cx.stroke();
    }
    cx.globalAlpha=1;
    cx.fillStyle=wep.color; cx.beginPath(); cx.arc(0,-8,6,0,Math.PI*2); cx.fill();
  }
  NSH();
  cx.restore();

  // ── Buttons ──
  // STOP button (□)
  cx.fillStyle='rgba(60,60,80,.75)';
  RR(8, LY.btnY-14, 38, 28, 7); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('⏹', 27, LY.btnY, 'bold 16px Arial', 'rgba(255,180,180,.85)');

  // LEFT
  const lSel=G.keys.left;
  cx.fillStyle=lSel?'rgba(100,180,255,.55)':'rgba(255,255,255,.12)';
  RR(52, LY.btnY-25, 76, 50, 10); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('◀ 移動', 90, LY.btnY, 'bold 15px Arial', lSel?'#fff':'rgba(255,255,255,.7)');

  // RIGHT
  const rSel=G.keys.right;
  cx.fillStyle=rSel?'rgba(100,180,255,.55)':'rgba(255,255,255,.12)';
  RR(VW-112, LY.btnY-25, 100, 50, 10); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('移動  ▶', VW-62, LY.btnY, 'bold 16px Arial', rSel?'#fff':'rgba(255,255,255,.7)');

  // FIRE
  const canFire=G.frozen<=0 && !G.arrows.some(a=>!a.done);
  cx.fillStyle=canFire?'rgba(255,70,70,.8)':'rgba(80,80,80,.5)';
  RR(VW/2-62, LY.btnY-28, 124, 56, 14); cx.fill();
  if(canFire){
    SH('#FF6B6B',14);
    const pulse=Math.sin(G.tick*5)*.5+.5;
    cx.strokeStyle=`rgba(255,${120+Math.floor(pulse*80)},50,.8)`;
    cx.lineWidth=2; RR(VW/2-62, LY.btnY-28, 124, 56, 14); cx.stroke();
  }
  const FIRE_LABELS={rocket:'🚀 発射！',rope:G._charging?'チャージ中…':'🤠 投げる！',net:'🎯 発射！',bugnet:'🦋 伸ばす！',chaos:'⚡ 発射！'};
  T(FIRE_LABELS[(WEAPONS[G.diff]||WEAPONS[0]).id]||'発射！', VW/2, LY.btnY, 'bold 18px Arial', canFire||G._charging?'#fff':'#555');
  NSH();
}

function drawHUD(){
  cx.fillStyle='rgba(4,6,28,.88)'; cx.fillRect(0,0,VW,LY.hudBot);
  cx.strokeStyle='rgba(255,255,255,.08)'; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(0,LY.hudBot); cx.lineTo(VW,LY.hudBot); cx.stroke();

  // Question box
  cx.fillStyle='rgba(255,255,255,.07)'; RR(10,7,VW-20,57,10); cx.fill();

  if(G.stage===1){
    T('小文字をゲット！', VW/2, 20, 'bold 13px Arial','rgba(180,200,255,.7)');
    SH('#FFD93D',20);
    T(G.question?.display||'?', VW/2, 52, 'bold 46px Arial','#FFD93D');
    NSH();
  } else {
    const w=G.question;
    T((w?.jp||'')+' → '+(w?.en||''), VW/2, 20, 'bold 13px Arial','rgba(180,200,255,.8)');
    const ans=w?.answer||'';
    const sx=VW/2-(ans.length*16)/2+8;
    for(let i=0;i<ans.length;i++){
      const col=i<G.letterIdx?'#6BCB77':i===G.letterIdx?'#FFD93D':'rgba(255,255,255,.25)';
      SH(i===G.letterIdx?'#FFD93D':'transparent',i===G.letterIdx?12:0);
      T(ans[i], sx+i*16, 52, 'bold 23px Arial', col);
    }
    NSH();
  }

  // Timer bar
  const tw=(VW-20)*(G.timer/G.timerMax);
  cx.fillStyle='rgba(255,255,255,.1)'; RR(10,70,VW-20,12,4); cx.fill();
  const tc=G.timer<20?'#FF6B6B':G.timer<40?'#FFD93D':'#6BCB77';
  cx.fillStyle=tc; RR(10,70,tw,12,4); cx.fill();

  // Score / time / combo
  SH(tc,6); T('⭐ '+G.score, 14, 92, 'bold 16px Arial','#fff','left'); NSH();
  T(Math.ceil(G.timer)+'秒', VW/2, 92, 'bold 14px Arial','rgba(255,255,255,.5)');
  if(G.combo>=3){
    const cc=G.combo>=10?'#FFD93D':G.combo>=5?'#6BCB77':'#4D96FF';
    SH(cc,8); T('×'+G.combo+' COMBO', VW-12, 92, 'bold 15px Arial',cc,'right'); NSH();
  }
}

function drawParts(){
  for(const p of G.parts){

    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill();

function drawLabels(){
  for(const l of G.labels){
    cx.save(); cx.globalAlpha=l.life;
    SH(l.color,8); T(l.text,l.x,l.y,`bold ${l.sz}px Arial`,l.color); cx.restore();

}
function drawFrozen(){
  if(G.frozen<=0) return;
  cx.fillStyle=`rgba(100,0,0,${Math.min(.25,G.frozen*.2)})`; cx.fillRect(0,0,VW,VH);
  cx.save(); cx.globalAlpha=Math.min(1,G.frozen*.9);
  SH('#FF6B6B',20); T('気をつけよう！',VW/2,VH*.54,'bold 22px Arial','#FF6B6B'); NSH();
  cx.restore();
}

// ════════════════════════════════════════════
function drawResult(){
  drawBG();
  cx.save();
  cx.globalAlpha=1;

  // ── スコアボックス ───────────────────────────────
  SH('#FFD93D',20); T('ゲーム終了！',VW/2,40,'bold 28px Arial','#FFD93D'); NSH();
  cx.fillStyle='rgba(255,255,255,.07)'; RR(20,58,VW-40,118,14); cx.fill();
  T('スコア',VW/2,78,'bold 13px Arial','rgba(255,255,255,.45)');
  SH('#FFD93D',14); T(G.score+'点',VW/2,126,'bold 50px Arial','#FFD93D'); NSH();
  const si=G.stage-1;
  const sc=G.score;
  const[r,rc]=sc>=200?['S','#FFD93D']:sc>=120?['A','#6BCB77']:sc>=60?['B','#4D96FF']:sc>=20?['C','#FF9F43']:['D','#FF6B6B'];
  SH(rc,20); T(r, VW-56, 90, 'bold 60px Arial', rc); NSH();
  if(G.score>0 && G.score>=G.best[si]){
    SH('#FF6B6B',8); T('🎉 新記録！',VW/2,162,'bold 15px Arial','#FF6B6B'); NSH();
  } else {
    T('ベスト：'+G.best[si]+'点  コンボ：'+G.maxCombo+'×',VW/2,162,'12px Arial','rgba(255,255,255,.38)');
  }

  // ── 間違えた文字の復習 ───────────────────────────
  const wr=G.wrongAnswers||[];
  if(wr.length>0){
    T('間違えた文字を復習しよう！',VW/2,200,'bold 13px Arial','rgba(255,200,100,.85)');

    // 全文字をアイコン一覧で表示
    const cols=Math.min(wr.length,8);
    const step=Math.min(52,(VW-40)/cols);
    const startX=VW/2-(cols-1)*step/2;
    for(let i=0;i<wr.length;i++){
      const bx=startX+(i%cols)*step;
      const by=224+(Math.floor(i/cols)*44);
      const isActive=G._reviewIdx===i;
      if(isActive){
        const pulse=Math.abs(Math.sin(G.tick*4))*.6+.4;
        cx.fillStyle=`rgba(255,211,61,${0.18*pulse+0.08})`;
        cx.beginPath(); cx.arc(bx,by,22,0,Math.PI*2); cx.fill();
        SH('#FFD93D',20*pulse); T(wr[i].display,bx,by,'bold 28px Arial','#FFD93D'); NSH();
        // 小文字ラベル（発音される文字）
        T(wr[i].answer,bx,by+20,'bold 14px Arial','rgba(255,211,61,.7)');
      } else {
        cx.fillStyle='rgba(255,255,255,.08)';
        cx.beginPath(); cx.arc(bx,by,18,0,Math.PI*2); cx.fill();
        T(wr[i].display,bx,by,'bold 22px Arial','rgba(255,255,255,.45)');
      }
    }

    // 大きく光る現在の文字
    const rowCnt=Math.ceil(wr.length/cols);
    const reviewY=240+rowCnt*44+12;
    if(G._reviewIdx>=0 && G._reviewIdx<wr.length){
      const cur=wr[G._reviewIdx];
      const pulse2=Math.abs(Math.sin(G.tick*3.5));
      const glow=80+Math.floor(pulse2*60);
      SH('#FFD93D',glow);
      T(cur.display,VW/2,reviewY+60,'bold 110px Arial',`rgba(255,${180+Math.floor(pulse2*60)},50,${0.7+pulse2*.3})`);
      NSH();
      T(cur.answer.toLowerCase(),VW/2,reviewY+118,'bold 28px Arial',`rgba(255,211,61,${0.5+pulse2*.4})`);
      T('♪',VW/2+80,reviewY+60,'20px Arial',`rgba(255,211,61,${pulse2})`);
    }

    const ry=Math.max(580, 240+rowCnt*44+180);
    BTN(VW/2,ry,220,50,'▶ もういちど',rc);
    BTN(VW/2,ry+62,220,46,'🏠 スタートにもどる','rgba(100,150,255,.6)');
  } else {
    // 誤答なし
    const msg={S:'完璧！すごすぎる！',A:'とても上手！',B:'よくできました！',C:'がんばったね！',D:'もう一度挑戦しよう！'};
    T('✨ 間違いなし！完璧！',VW/2,260,'bold 22px Arial','#6BCB77');
    T(msg[r],VW/2,310,'16px Arial','rgba(255,255,255,.75)');
    BTN(VW/2,400,220,50,'▶ もういちど',rc);
    BTN(VW/2,462,220,46,'🏠 スタートにもどる','rgba(100,150,255,.6)');
  }
  cx.restore();
}

// ════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════
function render(){
  cx.clearRect(0,0,VW,VH);
  switch(G.screen){
    case 'title':
      drawTitle(); break;
    case 'mode':
      drawModeSelect(); break;
    case 'playing':
      drawBG();
      drawObstacles();
      drawPermObs();
      drawBalloons();
      drawTarget();
      drawAimLine();
      drawArrows();
      drawPlayer();
      drawHUD();
      drawParts(); drawLabels(); drawFrozen();
      break;
    case 'boss':
      drawBG();
      drawObstacles();
      drawPermObs();
      drawBalloons();
      drawTarget();
      drawAimLine();
      drawArrows();
      drawPlayer();
      drawBossHUD();
      drawParts(); drawLabels(); drawFrozen();
      break;
    case 'result':
      drawResult(); break;
  }
}

// ════════════════════════════════════════════
function getXY(e){
  const r=cv.getBoundingClientRect(), s=e.touches?e.touches[0]:e;
  return {x:(s.clientX-r.left)/SC, y:(s.clientY-r.top)/SC};
}

function onDown(px,py){
  ia();
  if(AC && AC.state==='suspended') AC.resume();

  if(G.screen==='title'){
    if(IB(px,py,VW/2,428,250,56)){ G.stage=1; startGame(); return; }
    if(IB(px,py,VW/2,498,250,46)){ G.screen='mode'; return; }
    return;
  }
  if(G.screen==='mode'){
    if(IR(px,py,18,48,VW-36,88) && G.unlocked[0]) G.stage=1;
    if(IR(px,py,18,144,VW-36,78) && G.unlocked[1]) G.stage=2;
    for(let i=0;i<5;i++){ if(IR(px,py,16,250+i*44,VW-32,38)) G.diff=i; }
    if(IB(px,py,VW/2,498,220,44)){ startGame(); return; }
    if(IB(px,py,VW/2,552,160,36)){ G.screen='title'; return; }
    return;
  }
  if(G.screen==='playing'||G.screen==='boss'){
    // Stop button
    if(IR(px,py,8,LY.btnY-14,38,28)){ endGame(); return; }
    // Fire button
    if(IR(px,py,VW/2-62,LY.btnY-28,124,56)){ fireArrow(); return; }
    // Move left (shifted right to make room for stop button)
    if(IR(px,py,52,LY.btnY-25,76,50)){ G.keys.left=true; return; }
    // Move right
    if(IR(px,py,VW-112,LY.btnY-25,100,50)){ G.keys.right=true; return; }
    return;
  }
  if(G.screen==='result'){
    const wr=G.wrongAnswers||[];
    const rowCnt=Math.ceil(wr.length/Math.min(wr.length||1,8));
    const ry=wr.length>0?Math.max(580,240+rowCnt*44+180):400;
    if(IB(px,py,VW/2,ry,220,50)){ if(window.speechSynthesis) window.speechSynthesis.cancel(); startGame(); return; }
    if(IB(px,py,VW/2,ry+62,220,46)){ if(window.speechSynthesis) window.speechSynthesis.cancel(); G.screen='title'; stopBGM(); return; }
    // Tap a wrong letter to pronounce it immediately
    if(wr.length>0){
      const cols=Math.min(wr.length,8);
      const step=Math.min(52,(VW-40)/cols);
      const startX=VW/2-(cols-1)*step/2;
      for(let i=0;i<wr.length;i++){
        const bx=startX+(i%cols)*step;
        const by=224+(Math.floor(i/cols)*44);
        if(Math.hypot(px-bx,py-by)<22){ G._reviewIdx=i; _reviewSpeak(wr[i]); return; }
      }
    }
    return;
  }
}

function onUp(){
  G.keys.left=false; G.keys.right=false;
}

// Stage select clicks on the band need proper handling
function onModeClick(px,py){
  if(G.screen!=='mode') return;
  if(IR(px,py,18,100,VW-36,108)&&G.unlocked[0]){ G.stage=1; }
  if(IR(px,py,18,222,VW-36,108)&&G.unlocked[1]){ G.stage=2; }
}

cv.addEventListener('mousedown', e=>{ const p=getXY(e); onDown(p.x,p.y); onModeClick(p.x,p.y); });
cv.addEventListener('mouseup',   ()=>onUp());
cv.addEventListener('touchstart', e=>{ e.preventDefault(); const p=getXY(e); onDown(p.x,p.y); onModeClick(p.x,p.y); },{passive:false});
cv.addEventListener('touchend',   e=>{ e.preventDefault(); onUp(); },{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  G.keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') G.keys.right=true;
  if((e.key===' '||e.key==='Enter')&&(G.screen==='playing'||G.screen==='boss')){
    e.preventDefault(); fireArrow();
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  G.keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') G.keys.right=false;
});

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,.05);
  lastT=t;
  update(dt);
  render();
}
requestAnimationFrame(t=>{ lastT=t; requestAnimationFrame(loop); });
</script>
