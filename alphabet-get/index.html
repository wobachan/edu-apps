let AC=null;
function ia(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,type='sine',v=.25,when=0){
  if(!AC)return;
  const t=AC.currentTime+when,o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(v,t);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+d+.01);
}
function _noise(dur,vol,when,freqLo,freqHi){
  if(!AC)return;
  const len=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const hi=AC.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=freqLo||20;
  const lo=AC.createBiquadFilter(); lo.type='lowpass';  lo.frequency.value=freqHi||20000;
  const g=AC.createGain();
  const t=AC.currentTime+(when||0);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(hi); hi.connect(lo); lo.connect(g); g.connect(AC.destination);
  src.start(t); src.stop(t+dur+0.01);
}

function mkBalloon(letter, targetX, delay=0){
  const baseY=rand(LY.ballTop+28, LY.ballBot-28);
  // 目標Xに近い端から入ってくる
  const startX=targetX<VW/2 ? -55 : VW+55;
  return {
    letter, x:startX, targetX, baseY, y:baseY,
    color:rndC(), r:30,
    driftVx:rand(-.22,.22),   // 到着後のゆっくり漂い
    phase:rand(0,Math.PI*2), spd:rand(.009,.018),
    alpha:0, scale:1,
    popped:false, exiting:false, dead:false,
    arrived:false, delay,
  };
}

// ── 風船1個を画面端から追加 ──
function addBalloonFromSide(letter, delay=0){
  // 既存と重ならないx座標を探す
  const live=G.balloons.filter(b=>!b.dead);
  let tx;
  for(let t=0;t<30;t++){
    tx=rand(42,VW-42);
    if(live.every(b=>Math.abs((b.targetX??b.x)-tx)>52)) break;
  }
  G.balloons.push(mkBalloon(letter, tx??rand(42,VW-42), delay));
}

// ── Stage1: プールの補充（少なくなったら端から追加） ──
const POOL_TARGET=7, POOL_MIN=3;
function refillPool(){
  const live=G.balloons.filter(b=>!b.popped&&!b.exiting&&!b.dead);
  if(live.length>=POOL_MIN) return;
  const have=new Set(G.balloons.filter(b=>!b.dead&&!b.exiting).map(b=>b.letter.toLowerCase()));
  const pool=alpha.split('').filter(l=>!have.has(l));
  const toAdd=Math.min(POOL_TARGET-live.length, pool.length);
  for(let i=0;i<toAdd;i++){
    const idx=ri(0,pool.length-1);
    addBalloonFromSide(pool[idx], i*0.15);
    pool.splice(idx,1);
  }
}

// ── Stage2/Boss: 総入れ替え（端から順に入場） ──
function spreadBalloons(letters){
  G.balloons.forEach(b=>{
    if(!b.popped&&!b.exiting){ b.exiting=true; b.exitDir=b.x<VW/2?-1:1; }
  });
  const n=letters.length;
  const step=(VW-80)/(n-1||1);
  const xs=letters.map((_,i)=>clamp(40+i*step+rand(-10,10),38,VW-38));
  letters.forEach((l,i)=> G.balloons.push(mkBalloon(l, xs[i], i*0.09)));
}

function _shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=ri(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];}return arr; }
let _bossQueue=[];
function _nextBossWord(){
  if(_bossQueue.length===0) _bossQueue=_shuffle([...Array(BOSS_WORDS.length).keys()]);
  return BOSS_WORDS[_bossQueue.pop()];
}
function fillBalloons(){
  const usedSet=new Set();
  if(G.screen==='boss'){
    const needed=G.bossWord.en[G.bossLetterIdx].toLowerCase();
    usedSet.add(needed);
    const pool=alpha.split('').filter(l=>l!==needed);
    while(usedSet.size<5) usedSet.add(pool[ri(0,pool.length-1)]);
    spreadBalloons(_shuffle([...usedSet]));
  } else {
    // Stage 2
    const needed=G.question.answer[G.letterIdx].toLowerCase();
    usedSet.add(needed);
    const pool=alpha.split('').filter(l=>l!==needed);
    while(usedSet.size<5) usedSet.add(pool[ri(0,pool.length-1)]);
    spreadBalloons(_shuffle([...usedSet]));
  }
}

function isCorrectBalloon(b){
  if(G.screen==='boss') return b.letter.toLowerCase()===(G.bossWord?.en[G.bossLetterIdx]||'').toLowerCase();
  if(G.stage===1) return b.letter===G.question?.answer;
  return b.letter.toLowerCase()===(G.question?.answer[G.letterIdx]||'').toLowerCase();
}
function netCapture(netX, netY, radius){
  const alive=G.balloons.filter(b=>!b.popped);
  const caught=alive.filter(b=>Math.hypot(b.x-netX, b.y-netY)<radius);
  if(caught.length===0) return;
  const rights=caught.filter(b=>isCorrectBalloon(b));
  const wrongs=caught.filter(b=>!isCorrectBalloon(b));
  for(const b of wrongs){
    b.popped=true;
    spawnParts(b.x,b.y,'#aaa',6);
    G.combo=0; G._lastCorrectTime=0;
    addScore(-10);
    spawnLabel(b.x,b.y-20,'-10','#FF6B6B',18);
  }
  if(wrongs.length>0){ sndMiss(); G.frozen=0.8; }
  if(rights.length>0){
    onBalloonHit(rights[0]);
  } else if(!G.questionDone){
    if(G.stage===1){ setTimeout(nextQuestion,800); }
    else { setTimeout(fillBalloons,700); }
  }
}

function makeObstacleSet(n, speed, cy, emojis){
  // Spread n obstacles with gaps; speed > 0 = left→right, < 0 = right→left
  const objs=[];
  const spacing=VW/n;
  for(let i=0;i<n;i++){
    objs.push({
      x: i*spacing + rand(10, spacing-30),
      y: cy + rand(-18,18),
      vx: speed,
      emoji: emojis[ri(0,emojis.length-1)],
      w:40, h:30,
    });
  }
  return objs;
}

  G.obsB = makeObstacleSet(cnt,               -(spd+0.2), CY.obsB, set.b);
  G.obsA = makeObstacleSet(Math.max(1,cnt-2),  spd,        CY.obsA, set.a);
}

  // 弓矢のみ照準角度を取得（±20度）
  const aim = w.id==='arrow' ? Math.sin(G.tick*2.1)*(Math.PI/9) : 0;
  const spd = Math.abs(w.vy);
  G.arrows.push({
    x:px, startX:px, y:LY.aimBot-10,
    vx: w.id==='arrow' ? Math.sin(aim)*spd : 0,
    vy: w.id==='arrow' ? -Math.cos(aim)*spd : w.vy,
    angle: aim,
    age:0,
    weapon:w.id,
    done:false, trail:[],
    netR:0,
    retracting:false, retractColor:null, retractR:0,
  });
  sndShoot();
}
function fireArrow(){
  if(G.frozen>0) return;
  if(G.questionDone && G.screen!=='boss') return;
  if(G.arrows.some(a=>!a.done)) return;
  if(G._charging) return;
  const px=G.player.x;
  if(WEAPONS[G.diff].id==='rope'){
    G._charging=true; G._chargeTimer=0.35;
    return;
  }
  _spawnWeapon(px);
}

function spawnParts(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2), s=rand(2.5,8);
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      color,r:rand(3,8),life:1,decay:rand(.016,.038)});
  }
}
function spawnLabel(x,y,text,color,sz=22,decay=.013){
  G.labels.push({x,y,text,color,sz,life:1,decay,vy:-1.4});
}

// ════════════════════════════════════════════
//  CAPTURE LOGIC
// ════════════════════════════════════════════
function addScore(pts){ G.score=Math.max(0,G.score+Math.round(pts)); }
// 正解時：コンボを更新し 10×コンボ数 を返す
function incCombo(){
  const now=Date.now();
  const inCombo=(G._lastCorrectTime && now-G._lastCorrectTime<5000);
  G._lastCorrectTime=now;
  if(!inCombo) G.combo=0;
  G.combo++; if(G.combo>G.maxCombo) G.maxCombo=G.combo; G.totalCorrect++;
  const pts=10*G.combo;
  addScore(pts);
  if(G.combo>=2){ sndCombo(Math.min(G.combo,5)); }
  return pts;
}

function onBalloonHit(balloon){
  balloon.popped=true;
  let correct=false;

  if(G.screen==='boss'){
    const need=G.bossWord.en[G.bossLetterIdx].toLowerCase();
    correct=(balloon.letter.toLowerCase()===need);
    if(correct){
      spawnParts(balloon.x,balloon.y,balloon.color,18);
      sndPop();
      G.bossLetterIdx++;
      if(G.bossLetterIdx>=G.bossWord.en.length){
        // Word complete → damage boss
        G.bossHP=Math.max(0,G.bossHP-1);
        G.bossFlash=0.55;
        const bpts=incCombo();
        spawnLabel(VW/2,280,'+'+bpts,'#FFD93D',48,.008);
        spawnParts(G.bossX,G.bossY,rndC(),22);
        if(G.bossHP<=0){
          sndClear();
          addScore(100);
          spawnLabel(VW/2,260,'👑 BOSS CLEAR!! +100','#FFD93D',28);
          setTimeout(endGame,2000);
          return;
        }
        G.bossLetterIdx=0;
        G.bossWord=_nextBossWord();
        setTimeout(fillBalloons,600);
      } else {
        const hpts=incCombo();
        spawnLabel(balloon.x,balloon.y-35,'+'+hpts,'#6BCB77',48,.008);
        setTimeout(fillBalloons,450);
      }
    } else {
      wrongHit(balloon.x, balloon.y);
      setTimeout(fillBalloons,650);
    }
    return;
  }

  // Stage 1（プール制：風船はそのまま、問題だけ次へ）
  if(G.stage===1){
    correct=(balloon.letter===G.question.answer);
    if(correct){
      spawnParts(balloon.x,balloon.y,balloon.color,16);
      sndPop();
      const pts=incCombo();
      spawnLabel(balloon.x,balloon.y-35,'+'+pts,balloon.color,48,.008);
      G.questionDone=true;
      setTimeout(nextQuestion,600); // 残りの風船から次の問題を出す
    } else {
      wrongHit(balloon.x,balloon.y);
      // 不正解で割れた風船もなくなる→refillPoolが補充
    }
    return;
  }

  // Stage 2
  correct=(balloon.letter.toLowerCase()===G.question.answer[G.letterIdx].toLowerCase());
  if(correct){
    spawnParts(balloon.x,balloon.y,balloon.color,14);
    sndPop();
    G.letterIdx++;
    const lpts=incCombo();
    spawnLabel(balloon.x,balloon.y-35,'+'+lpts,'#6BCB77',48,.008);
    if(G.letterIdx>=G.question.answer.length){
      sndClear();
      spawnLabel(VW/2,310,'+'+lpts,'#FFD93D',52,.007);
      G.questionDone=true;
      setTimeout(nextQuestion,1100);
    } else {
      setTimeout(fillBalloons,450);
    }
  } else {
    wrongHit(balloon.x,balloon.y);
    setTimeout(fillBalloons,700);
  }
}

function wrongHit(x,y){
  G.combo=0; G._lastCorrectTime=0;
  addScore(-10);
  sndMiss();
  spawnLabel(x,y-30,'-10 ✗','#FF6B6B',22);
  if(G.diff===4) spawnPermObs();
  // 誤答記録（復習用）
  if(G.screen==='boss' && G.bossWord){
    const key=G.bossWord.en[G.bossLetterIdx]||'';
    if(key && !G._wrongSet.has(key)){
      G._wrongSet.add(key);
      G.wrongAnswers.push({display:key.toUpperCase(), answer:key.toLowerCase(), en:key});
    }
  } else if(G.question){
    const key=G.stage===1 ? G.question.answer : (G.question.answer[G.letterIdx]||'');
    const disp=G.stage===1 ? G.question.display : key.toUpperCase();
    if(key && !G._wrongSet.has(key)){
      G._wrongSet.add(key);
      G.wrongAnswers.push({display:disp, answer:key, en:key});
    }
  }
  G.frozen=1.3;
}

// ════════════════════════════════════════════
//  QUESTIONS
// ════════════════════════════════════════════
const usedS1=new Set(), usedS2=new Set();
function nextQuestion(){
  G.letterIdx=0; G.questionDone=false;

  if(G.stage===1){
    // プール内の生きている風船から次の問題を選ぶ
    const live=G.balloons.filter(b=>!b.popped&&!b.exiting&&!b.dead);
    let candidates=live.filter(b=>!usedS1.has(b.letter.toLowerCase()));
    if(candidates.length===0){ usedS1.clear(); candidates=live; }
    if(candidates.length===0){
      // プールが空なら補充してから少し待つ
      refillPool();
      setTimeout(nextQuestion,500);
      return;
    }
    // プレイヤーから最も遠い風船を出題（左右に動かないと正解できない）
    candidates.sort((a,b)=>Math.abs(b.x-G.player.x)-Math.abs(a.x-G.player.x));
    const chosen=candidates[0];
    usedS1.add(chosen.letter.toLowerCase());
    G.question={display:chosen.letter.toUpperCase(), answer:chosen.letter.toLowerCase()};
    speakQuestion();
    // プールが少なければ補充
    refillPool();
  } else {
    if(usedS2.size>=WORDS.length) usedS2.clear();
    let w; do{ w=WORDS[ri(0,WORDS.length-1)]; }while(usedS2.has(w.en));
    usedS2.add(w.en);
    G.question={jp:w.jp, en:w.en, answer:w.en};
    speakQuestion();
    fillBalloons();
  }
}

// ════════════════════════════════════════════
//  GAME FLOW
// ════════════════════════════════════════════
function startGame(){
  G.timer=60; G.timerMax=60;
  G.score=0; G.combo=0; G.maxCombo=0;
  G.balloons=[]; G.arrows=[]; G.parts=[]; G.labels=[]; G.permObs=[];
  G.frozen=0; G.tick=0; G._bossTriggered=false; G._lastCorrectTime=0;
  G._speakTimer=0; G._charging=false; G._chargeTimer=0; G._cdSpoken=new Set(); G._timeoutFlash=0;
  G.wrongAnswers=[]; G._wrongSet=new Set();
  G.player={x:VW/2}; G.keys={left:false,right:false};
  usedS1.clear(); usedS2.clear();
  initObstacles();

  if(G.stage===1){
    // Stage1: まず風船プールを作ってから問題を選ぶ
    const letters=[...alpha].sort(()=>Math.random()-.5).slice(0,POOL_TARGET);
    letters.forEach((l,i)=>addBalloonFromSide(l, i*0.1));
    setTimeout(nextQuestion, 300); // 風船が登場し始めてから出題
  } else {
    nextQuestion();
  }

  // 馬に乗った登場演出（'intro'画面 → 完了後 'playing' へ）
  G._intro={ x:-120, phase:'enter', timer:0 };
  G.screen='intro';
  startBGM();
}

function startBoss(){
  G.screen='boss';
  G.bossWord=_nextBossWord();
  G.bossLetterIdx=0; G.bossHP=5; G.bossMaxHP=5;
  G.bossX=VW/2; G.bossY=CY.ball; G.bossDX=.6; G.bossFlash=0;
  G.arrows=[];
  setTimeout(fillBalloons,500);
}

function endGame(){
  stopBGM();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  const si=G.stage-1;
  if(G.score>G.best[si]) G.best[si]=G.score;
  if(G.maxCombo>G.bestCombo[si]) G.bestCombo[si]=G.maxCombo;
  // ステージ2は常に開放済み
  saveG();
  // 復習セットアップ
  G._reviewIdx=-1; G._reviewTimer=0.8; G._reviewActive=G.wrongAnswers.length>0; G._reviewSpeakCount=0;
  G.screen='result';
}
function _reviewSpeak(item){
  if(!window.speechSynthesis||!item) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(item.en);
  u.lang='en-US'; u.rate=0.75; u.pitch=1.1; u.volume=1.0;
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════
function update(dt){
  G.tick+=dt;

  // ── 登場演出（intro） ──
  if(G.screen==='intro' && G._intro){
    const intro=G._intro;
    if(intro.phase==='enter'){
      intro.x+=7;
      if(intro.x>=VW/2){ intro.phase='pause'; intro.timer=1.0; }
    } else if(intro.phase==='pause'){
      intro.timer-=dt;
      if(intro.timer<=0) intro.phase='exit';
    } else {
      intro.x+=10;
      if(intro.x>VW+130){ G.screen='playing'; G._intro=null; speakQuestion(); }
    }
    goto_effects(dt);
    return; // ゲームロジックはまだ動かさない
  }

  // タイムアウト演出
  if(G.screen==='timeout'){
    G._timeoutFlash-=dt;
    if(G._timeoutFlash<=0) endGame();
    return;
  }
  const playing=G.screen==='playing'||G.screen==='boss';

  if(playing){
    if(G.frozen>0){ G.frozen-=dt; goto_effects(dt); return; }

    // Timer & boss trigger
    if(G.screen==='playing'||G.screen==='boss'){
      G.timer-=dt;
      // 残り5秒：カウントダウン発音
      if(G.timer<=5 && G.timer>0){
        const n=Math.ceil(G.timer);
        if(!G._cdSpoken.has(n)){
          G._cdSpoken.add(n);
          if(window.speechSynthesis){
            window.speechSynthesis.cancel();
            const u=new SpeechSynthesisUtterance(String(n));
            u.lang='en-US'; u.rate=1.0; u.pitch=1.3; u.volume=1.0;
            const fv=_femaleVoice(); if(fv) u.voice=fv;
            window.speechSynthesis.speak(u);
          }
        }
      }
      if(G.timer<=0){ G.timer=0; G._timeoutFlash=1.8; G.screen='timeout'; stopBGM(); sndGameOver(); return; }
      if(G.stage===1 && G.score>=100 && !G._bossTriggered){
        G._bossTriggered=true;
        startBoss(); return;
      }
    }

    // 2秒ごとに発音
    if(G.question){
      G._speakTimer=(G._speakTimer||0)+dt;
      if(G._speakTimer>=2){ G._speakTimer=0; speakQuestion(); }
    }

    // Stage1: プール補充チェック
    if(G.screen==='playing' && G.stage===1) refillPool();

    // Player movement
    const SPD=5.0;
    if(G.keys.left)  G.player.x=clamp(G.player.x-SPD, 28, VW-28);
    if(G.keys.right) G.player.x=clamp(G.player.x+SPD, 28, VW-28);

    // Balloons: entry / drift / exit
    for(const b of G.balloons){
      // 割れた風船：弾けて消える
      if(b.popped){ b.scale+=.07; b.alpha=Math.max(0,b.alpha-.09); continue; }
      // 退場中：端へ流れて消える
      if(b.exiting){
        b.x+=b.exitDir*3.5;
        b.alpha=Math.max(0,b.alpha-0.045);
        if(b.alpha<=0) b.dead=true;
        continue;
      }
      // 登場ディレイ
      if(b.delay>0){ b.delay-=dt; continue; }
      // フェードイン
      b.alpha=Math.min(1,b.alpha+.07);
      // 目標X位置へスライドイン
      if(!b.arrived){
        const dx=b.targetX-b.x;
        if(Math.abs(dx)<3){ b.x=b.targetX; b.arrived=true; }
        else { b.x+=Math.sign(dx)*Math.min(Math.abs(dx)*.13+1.8, 5); }
      } else {
        // 到着後：ゆっくり漂う
        b.x+=b.driftVx;
        if(b.x<36||b.x>VW-36) b.driftVx*=-1;
        b.x=clamp(b.x,36,VW-36);
      }
      b.y=b.baseY+Math.sin(G.tick*.75+b.phase)*9;
    }
    G.balloons=G.balloons.filter(b=>!b.dead&&(!b.popped||b.alpha>0.01));

    // Obstacles scroll – wrap around
    for(const o of G.obsA){ // clouds, left→right
      o.x+=o.vx;
      if(o.x>VW+50) o.x=-50;
    }
    for(const o of G.obsB){ // birds, right→left
      o.x+=o.vx;
      if(o.x<-50) o.x=VW+50;
    }

    // Rope charge countdown
    if(G._charging){
      G._chargeTimer-=dt;
      if(G._chargeTimer<=0){ G._charging=false; _spawnWeapon(G.player.x); }
    }

    // Arrows
    for(const ar of G.arrows){
      if(ar.done) continue;
      ar.age+=dt;
      ar.trail.push({x:ar.x, y:ar.y});
      if(ar.trail.length>14) ar.trail.shift();
      ar.y+=ar.vy;
      if(ar.vx) ar.x+=ar.vx;

      // ── ロープ/虫取り網：縮み中（捕獲済み、引き戻し）
      if((ar.weapon==='rope'||ar.weapon==='bugnet') && ar.retracting){
        if(ar.weapon==='rope') ar.x=ar.startX; // まっすぐ戻る
        if(ar.y>=LY.aimBot+10) ar.done=true;
        continue;
      }

      // ── ネットランチャー：縮み中
      if(ar.weapon==='net' && ar.retracting){
        ar.netR=Math.max(0,ar.netR-8);
        if(ar.netR<=0) ar.done=true;
        continue;
      }

      // Rope: sinusoidal swing（縮み中以外）
      if(ar.weapon==='rope'){
        ar.x=ar.startX+Math.sin(ar.age*5)*30;
        ar.x=Math.max(10,Math.min(VW-10,ar.x));
      }

      // Net: バンド中央(CY.ball)まで進んでから展開
      if(ar.weapon==='net' && ar.y<=LY.ballBot+10 && ar.y>=LY.ballTop-20){
        if(ar.y > CY.ball+6){ ar.vy=-5; }
        else { ar.vy=0; ar.y=Math.min(ar.y,CY.ball); ar.netR+=7; }
        if(ar.netR>=60){ netCapture(ar.x,ar.y,ar.netR); ar.retracting=true; } // 縮み開始
        continue;
      }

      // ── Permanent obstacle collision
      for(const po of G.permObs){
        if(Math.abs(ar.x-po.x)<po.w/2+4 && Math.abs(ar.y-po.y)<po.h/2+6){
          ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#C77DFF',8);
          if(ar.weapon!=='bugnet'){ G.frozen=0.7; G.combo=0; addScore(-10); if(G.diff===4) spawnPermObs(); }
          break;
        }
      }
      if(ar.done) continue;

      // ── Collision: OBS-B band
      if(ar.y>=LY.obsBTop-6 && ar.y<=LY.obsBBot+6){
        for(const o of G.obsB){
          if(Math.abs(ar.x-o.x)<o.w/2+4){
            ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#aaa',8);
            if(ar.weapon!=='bugnet'){ G.frozen=0.7; G.combo=0; addScore(-10); if(G.diff===4) spawnPermObs(); }
            break;
          }
        }
      }
      if(ar.done) continue;

      // ── Collision: OBS-A band
      if(ar.y>=LY.obsATop-6 && ar.y<=LY.obsABot+6){
        for(const o of G.obsA){
          if(Math.abs(ar.x-o.x)<o.w/2+4){
            ar.done=true; sndBlock(); spawnParts(ar.x,ar.y,'#aaa',8);
            if(ar.weapon!=='bugnet'){ G.frozen=0.7; G.combo=0; addScore(-10); if(G.diff===4) spawnPermObs(); }
            break;
          }
        }
      }
      if(ar.done) continue;

      // ── Balloon band: hit nearest (non-net weapons)
      if(ar.weapon!=='net' && ar.y<=LY.ballBot && ar.y>=LY.ballTop-16){
        const alive=G.balloons.filter(b=>!b.popped);
        if(alive.length>0){
          const near=alive.reduce((a,b)=>Math.abs(a.x-ar.x)<Math.abs(b.x-ar.x)?a:b);
          if(Math.abs(near.x-ar.x)<near.r+10){
            if(ar.weapon==='rope'||ar.weapon==='bugnet'){
              // 捕獲：即スコア計上して引き戻しアニメ開始
              ar.retracting=true; ar.vy=9;
              ar.retractColor=near.color; ar.retractR=near.r*0.75;
              onBalloonHit(near);
            } else {
              ar.done=true; onBalloonHit(near);
            }
            continue;
          }
        }
        if(ar.y<LY.ballTop-20) ar.done=true;
      }

      if(ar.y<LY.ballTop-30) ar.done=true;
    }
    G.arrows=G.arrows.filter(a=>!a.done);

    // Boss movement
    if(G.screen==='boss'){
      G.bossX+=G.bossDX;
      if(G.bossX<70||G.bossX>VW-70) G.bossDX*=-1;
      if(G.bossFlash>0) G.bossFlash-=dt;
    }
  }

  goto_effects(dt);
}

function goto_effects(dt){
  for(const p of G.parts){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.vx*=.97; p.life-=p.decay;
  }
  G.parts=G.parts.filter(p=>p.life>0);
  for(const l of G.labels){ l.y+=l.vy; l.life-=l.decay; }
  G.labels=G.labels.filter(l=>l.life>0);
  // 復習アニメーション
  if(G.screen==='result' && G._reviewActive && G.wrongAnswers.length>0){
    G._reviewTimer-=dt;
    if(G._reviewTimer<=0){
      if(G._reviewIdx<0){
        // 最初の文字：即発音
        G._reviewIdx=0; G._reviewSpeakCount=1; G._reviewTimer=1.0;
        _reviewSpeak(G.wrongAnswers[0]);
      } else if(G._reviewSpeakCount<3){
        // 同じ文字をもう一度（計3回まで）
        _reviewSpeak(G.wrongAnswers[G._reviewIdx]);
        G._reviewSpeakCount++; G._reviewTimer=1.0;
      } else {
        // 次の文字へ
        const nxt=G._reviewIdx+1;
        if(nxt<G.wrongAnswers.length){
          G._reviewIdx=nxt; G._reviewSpeakCount=1; G._reviewTimer=1.0;
          _reviewSpeak(G.wrongAnswers[nxt]);
        } else {
          G._reviewActive=false; // 全部終了→静かに
        }
      }
    }
  }
}

// ════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════
function RR(x,y,w,h,r=8){ cx.beginPath(); cx.roundRect(x,y,w,h,r); }
function T(s,x,y,font,col,align='center',base='middle'){
  cx.font=font; cx.fillStyle=col; cx.textAlign=align; cx.textBaseline=base; cx.fillText(s,x,y);
}
function SH(col,blur){ cx.shadowColor=col; cx.shadowBlur=blur; }
function NSH(){ cx.shadowBlur=0; }
function BTN(x,y,w,h,label,bg,fg='#fff',r=10){
  cx.fillStyle=bg; RR(x-w/2,y-h/2,w,h,r); cx.fill();
  cx.fillStyle=fg; cx.font=`bold ${Math.max(13,Math.floor(h*.38))}px Arial`;
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(label,x,y);
}
function IB(px,py,x,y,w,h){ return px>x-w/2&&px<x+w/2&&py>y-h/2&&py<y+h/2; }
function IR(px,py,x,y,w,h){ return px>=x&&px<=x+w&&py>=y&&py<=y+h; }

// ════════════════════════════════════════════
//  DRAW: BACKGROUND + LAYERS
// ════════════════════════════════════════════
// ── 共通：レイヤー帯と方向ラベル ──
function _drawLayers(bandA,bandB,sepCol,lblCol,lA,lB){
  const gBall=cx.createLinearGradient(0,LY.ballTop,0,LY.ballBot);
  gBall.addColorStop(0,bandA[0]); gBall.addColorStop(1,bandA[1]);
  cx.fillStyle=gBall; cx.fillRect(0,LY.ballTop,VW,LY.ballBot-LY.ballTop);
  const gB=cx.createLinearGradient(0,LY.obsBTop,0,LY.obsBBot);
  gB.addColorStop(0,bandB[0]); gB.addColorStop(1,bandB[1]);
  cx.fillStyle=gB; cx.fillRect(0,LY.obsBTop,VW,LY.obsBBot-LY.obsBTop);
  const gA=cx.createLinearGradient(0,LY.obsATop,0,LY.obsABot);

}

function _bgSky(){

  gr.addColorStop(0,'#1a7fd4'); gr.addColorStop(.35,'#4aaee8');
  gr.addColorStop(.7,'#87cef5'); gr.addColorStop(1,'#c8eaff');
  cx.fillStyle=gr; cx.fillRect(0,0,VW,VH);
  // うろこ雲
  cx.globalAlpha=.13; cx.fillStyle='#fff';
  for(let i=0;i<12;i++){
    const x2=(i*83+G.tick*6)%(VW+100)-50, y2=30+i*7, r=14+i%3*8;

              ['rgba(255,255,255,.07)','rgba(200,230,255,.04)'],
              'rgba(255,255,255,.15)','rgba(30,60,120,.45)',s.lA,s.lB);

function _bgWestern(){

function _bgSpace(){

  gr.addColorStop(.7,'#0b1540'); gr.addColorStop(1,'#150830');
  cx.fillStyle=gr; cx.fillRect(0,0,VW,VH);

function drawBalloons(){
  for(const b of G.balloons){
    if(b.alpha<.01) continue;
    cx.save();
    cx.globalAlpha=b.alpha;
    cx.translate(b.x, b.y);
    cx.scale(b.scale, b.scale);

    // String
    cx.strokeStyle='rgba(255,255,255,.25)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(0, b.r+2); cx.lineTo(rand(-3,3), b.r+20); cx.stroke();

    // Body (ellipse)
    const gr=cx.createRadialGradient(-b.r*.3,-b.r*.4,1,0,0,b.r);
    gr.addColorStop(0,b.color+'ee'); gr.addColorStop(1,b.color+'44');
    SH(b.color,16);
    cx.beginPath(); cx.ellipse(0,-2,b.r,b.r*1.12,0,0,Math.PI*2);
    cx.fillStyle=gr; cx.fill();
    NSH();
    cx.strokeStyle='rgba(255,255,255,.28)'; cx.lineWidth=1.5; cx.stroke();

    // Shine
    cx.beginPath(); cx.ellipse(-b.r*.32,-b.r*.52,b.r*.2,b.r*.14,-.4,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,.32)'; cx.fill();

    // Letter（小文字は手書き体フォント）
    SH('#000',5);
    const _isLower=b.letter===b.letter.toLowerCase()&&b.letter!==b.letter.toUpperCase();
    const _bfont=_isLower?`bold ${b.r*.95}px 'Comic Sans MS',cursive`:`bold ${b.r*.95}px 'Segoe UI',Arial`;
    T(b.letter,0,-2,_bfont,'#fff');
    NSH();
    cx.restore();
  }
}

function drawObstacles(){
  // Birds (right→left, OBS-B band) — 絵文字は左向きのままでOK
  for(const o of G.obsB){

    cx.fillStyle='#FFD93D';

function drawAimLine(){
  const px=G.player.x;
  const hasActive=G.arrows.some(a=>!a.done);
  if(hasActive) return;
  cx.save();
  cx.setLineDash([4,7]); cx.lineWidth=1;
  // Color the aim line based on obstacle proximity
  let danger=false;
  for(const o of [...G.obsA,...G.obsB]){
    if(Math.abs(o.x-px)<o.w/2+8){ danger=true; break; }
  }
  cx.strokeStyle=danger?'rgba(255,80,80,.35)':'rgba(255,255,255,.22)';
  cx.beginPath(); cx.moveTo(px,LY.aimBot); cx.lineTo(px,LY.ballTop+10);
  cx.stroke();
  cx.setLineDash([]);
  cx.restore();
}

function drawArrows(){
  for(const ar of G.arrows){
    if(ar.done) continue;
    const w=WEAPONS[G.diff]||WEAPONS[0];
    cx.save();

    // Net expanding circle
    if(ar.weapon==='net' && ar.netR>0){
      cx.globalAlpha=0.55; cx.strokeStyle='#4D96FF'; cx.lineWidth=3;
      cx.beginPath(); cx.arc(ar.x,ar.y,ar.netR,0,Math.PI*2); cx.stroke();
      cx.globalAlpha=0.12; cx.fillStyle='#4D96FF'; cx.fill();
      // Grid lines
      cx.globalAlpha=0.4; cx.lineWidth=1.5;
      for(let a=0;a<Math.PI;a+=Math.PI/3){
        cx.beginPath(); cx.moveTo(ar.x+Math.cos(a)*ar.netR,ar.y+Math.sin(a)*ar.netR);
        cx.lineTo(ar.x-Math.cos(a)*ar.netR,ar.y-Math.sin(a)*ar.netR); cx.stroke();
      }
      cx.globalAlpha=1; cx.restore(); continue;
    }

    // Trail
    for(let i=0;i<ar.trail.length;i++){
      const t=ar.trail[i];
      cx.globalAlpha=(i/ar.trail.length)*.5;
      cx.fillStyle=w.color;
      cx.beginPath(); cx.arc(t.x,t.y,ar.weapon==='bugnet'?3.5:2,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1;

    if(ar.weapon==='rocket'){
      // 火縄銃の弾：丸い弾丸
      SH(w.color,14);
      cx.fillStyle=w.color;
      cx.beginPath(); cx.ellipse(ar.x,ar.y-4,5,8,0,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,200,.8)';
      cx.beginPath(); cx.ellipse(ar.x-1,ar.y-7,2,3,-.3,0,Math.PI*2); cx.fill();
      NSH();
    } else if(ar.weapon==='arrow'){
      // 弓矢：発射角度で傾けて描画
      cx.save();
      cx.translate(ar.x, ar.y);
      cx.rotate(ar.angle||0);
      cx.lineCap='round';
      cx.strokeStyle='rgba(0,0,0,.7)'; cx.lineWidth=6;
      cx.beginPath(); cx.moveTo(0,12); cx.lineTo(0,-18); cx.stroke();
      cx.fillStyle='rgba(0,0,0,.6)';
      cx.beginPath(); cx.moveTo(0,-23); cx.lineTo(-7,-10); cx.lineTo(7,-10); cx.closePath(); cx.fill();
      SH(w.color,22);
      cx.strokeStyle=w.color; cx.lineWidth=3;
      cx.beginPath(); cx.moveTo(0,12); cx.lineTo(0,-18); cx.stroke();
      cx.fillStyle=w.color;
      cx.beginPath(); cx.moveTo(0,-23); cx.lineTo(-6,-10); cx.lineTo(6,-10); cx.closePath(); cx.fill();
      cx.strokeStyle=w.color; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(-6,12); cx.lineTo(0,2); cx.lineTo(6,12); cx.stroke();
      NSH();
      cx.restore();
    } else if(ar.weapon==='rope'){
      // ロープ：黒アウトライン＋明るいライムグリーンで高コントラスト
      cx.strokeStyle='rgba(0,0,0,.65)'; cx.lineWidth=7; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+8,ar.y+20); cx.quadraticCurveTo(ar.x+16,ar.y+8,ar.x,ar.y); cx.stroke();
      cx.beginPath(); cx.arc(ar.x,ar.y-8,8,0,Math.PI*2); cx.stroke();
      SH(w.color,24);
      cx.strokeStyle=w.color; cx.lineWidth=3.5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+8,ar.y+20); cx.quadraticCurveTo(ar.x+16,ar.y+8,ar.x,ar.y); cx.stroke();
      cx.beginPath(); cx.arc(ar.x,ar.y-8,8,0,Math.PI*2); cx.stroke();
      NSH();
    } else if(ar.weapon==='bugnet'){
      // 虫取り網：白アウトライン→色
      cx.strokeStyle='rgba(0,0,0,.45)'; cx.lineWidth=5; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+2,ar.y+30); cx.lineTo(ar.x-1,ar.y-10); cx.stroke();
      cx.beginPath(); cx.ellipse(ar.x,ar.y-22,13,6,0,0,Math.PI*2); cx.stroke();
      SH('#fff',14);
      cx.strokeStyle=w.color; cx.lineWidth=3; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(ar.x+2,ar.y+30); cx.lineTo(ar.x-1,ar.y-10); cx.stroke();
      cx.beginPath(); cx.ellipse(ar.x,ar.y-22,13,6,0,0,Math.PI*2); cx.stroke();
      cx.lineWidth=1.5; cx.globalAlpha=0.6;
      cx.beginPath(); cx.moveTo(ar.x-13,ar.y-22); cx.lineTo(ar.x,ar.y-10); cx.lineTo(ar.x+13,ar.y-22); cx.stroke();
      cx.globalAlpha=1; NSH();
    } else {
      // fallback: standard arrow
      SH(w.color,10);
      cx.strokeStyle=w.color; cx.lineWidth=3;
      cx.beginPath(); cx.moveTo(ar.x,ar.y+14); cx.lineTo(ar.x,ar.y); cx.stroke();
      cx.fillStyle=w.color;
      cx.beginPath(); cx.moveTo(ar.x,ar.y-14); cx.lineTo(ar.x-5,ar.y); cx.lineTo(ar.x+5,ar.y); cx.closePath(); cx.fill();
      NSH();
    }

    // ロープ/虫取り網：引き戻し中に捕獲バルーンを道具の先端に描画
    if((ar.weapon==='rope'||ar.weapon==='bugnet') && ar.retracting && ar.retractColor){
      const br=ar.retractR||16;
      const tipY=ar.weapon==='rope'? ar.y-8 : ar.y-22;
      cx.save();
      cx.shadowColor=ar.retractColor; cx.shadowBlur=14;
      cx.beginPath(); cx.arc(ar.x,tipY-br,br,0,Math.PI*2);
      cx.fillStyle=ar.retractColor+'99'; cx.fill();
      cx.strokeStyle=ar.retractColor; cx.lineWidth=2; cx.stroke();
      cx.restore();
    }

    cx.restore();
  }
}

//  DRAW: PLAYER + CONTROLS

function drawPlayer(){
  const px=G.player.x;

  // Aim indicator on ground
  cx.fillStyle='rgba(255,220,50,.15)';
  cx.beginPath(); cx.ellipse(px, LY.playerY+22, 28, 7, 0, 0, Math.PI*2); cx.fill();

  // 武器の道具を描画
  cx.save();
  cx.translate(px, LY.playerY);
  const wep=WEAPONS[G.diff]||WEAPONS[0];
  SH(wep.color,10);
  cx.lineCap='round';
  if(wep.id==='rocket'){
    // 火縄銃：銃身を上に向けたガン
    cx.strokeStyle=wep.color; cx.lineWidth=5;
    cx.beginPath(); cx.moveTo(-6,20); cx.lineTo(-6,-5); cx.stroke();
    cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(-6,-5); cx.lineTo(0,-26); cx.stroke();
    cx.strokeStyle='rgba(255,255,255,.5)'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(-10,5); cx.lineTo(-2,5); cx.stroke(); // 引き金
    cx.fillStyle=wep.color;
    cx.beginPath(); cx.ellipse(-6,20,5,4,0,0,Math.PI*2); cx.fill(); // グリップ
    cx.fillStyle='rgba(255,220,0,.9)';
    cx.beginPath(); cx.ellipse(0,-28,3,4,0,0,Math.PI*2); cx.fill(); // 銃口の光
  } else if(wep.id==='arrow'){
    // 弓矢：照準角度でスイング
    const aim=Math.sin(G.tick*2.1)*(Math.PI/9);
    const bend=Math.sin(G.tick*1.5)*3;
    // 照準ライン（点線）
    cx.save();
    cx.globalAlpha=0.38; cx.strokeStyle='#FFD93D'; cx.lineWidth=1.2;
    cx.setLineDash([4,7]);
    cx.beginPath(); cx.moveTo(0,-8);
    cx.lineTo(Math.sin(aim)*110,-8-Math.cos(aim)*110); cx.stroke();
    cx.setLineDash([]); cx.globalAlpha=1; cx.restore();
    // 弓と矢を照準角度で回転
    cx.save(); cx.rotate(aim);
    cx.strokeStyle=wep.color; cx.lineWidth=2.5;
    cx.beginPath(); cx.moveTo(-14,-20+bend); cx.quadraticCurveTo(-4,0,-14,20-bend); cx.stroke();
    cx.strokeStyle='rgba(255,255,255,.6)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(-14,-20+bend); cx.lineTo(-14,20-bend); cx.stroke();
    cx.strokeStyle='#c8a060'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(-14,0); cx.lineTo(8,-22); cx.stroke();
    cx.fillStyle=wep.color;
    cx.beginPath(); cx.moveTo(8,-22); cx.lineTo(2,-14); cx.lineTo(14,-16); cx.closePath(); cx.fill();
    cx.restore();
  } else if(wep.id==='rope'){
    const sw=Math.sin(G.tick*3)*0.4;
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(6,18); cx.quadraticCurveTo(16+Math.sin(G.tick*2)*6,-4,Math.cos(sw)*18,-18); cx.stroke();
    cx.beginPath(); cx.ellipse(Math.cos(sw)*18,-18,10,5,sw,0,Math.PI*2); cx.stroke();
    // Show charging indicator
    if(G._charging){
      const cp=1-(G._chargeTimer/0.35);
      cx.fillStyle=wep.color; cx.globalAlpha=cp;
      cx.beginPath(); cx.arc(0,0,24*cp,0,Math.PI*2); cx.fill();
      cx.globalAlpha=1;
    }
  } else if(wep.id==='net'){
    cx.strokeStyle=wep.color; cx.lineWidth=4;
    cx.beginPath(); cx.moveTo(-8,20); cx.lineTo(8,20); cx.lineTo(6,-14); cx.lineTo(-6,-14); cx.closePath(); cx.stroke();
    cx.beginPath(); cx.arc(0,-22,9,0,Math.PI*2); cx.stroke();
    cx.lineWidth=1.5;
    cx.beginPath(); cx.moveTo(-9,-22); cx.lineTo(9,-22); cx.moveTo(0,-31); cx.lineTo(0,-13); cx.stroke();
  } else if(wep.id==='bugnet'){
    cx.strokeStyle=wep.color; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(2,30); cx.lineTo(-1,-22); cx.stroke();
    cx.beginPath(); cx.ellipse(0,-28,14,6,0,0,Math.PI*2); cx.stroke();
    cx.lineWidth=1.5; cx.globalAlpha=0.65;
    cx.beginPath(); cx.moveTo(-14,-28); cx.lineTo(0,-14); cx.lineTo(14,-28); cx.stroke();
    cx.globalAlpha=1;
  }
  NSH();
  cx.restore();

  // ── Buttons ──
  // STOP button (□)
  cx.fillStyle='rgba(60,60,80,.75)';
  RR(8, LY.btnY-14, 38, 28, 7); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('⏹', 27, LY.btnY, 'bold 16px Arial', 'rgba(255,180,180,.85)');

  // LEFT
  const lSel=G.keys.left;
  cx.fillStyle=lSel?'rgba(100,180,255,.55)':'rgba(255,255,255,.12)';
  RR(52, LY.btnY-25, 76, 50, 10); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('◀', 90, LY.btnY, 'bold 22px Arial', lSel?'#fff':'rgba(255,255,255,.7)');

  // RIGHT
  const rSel=G.keys.right;
  cx.fillStyle=rSel?'rgba(100,180,255,.55)':'rgba(255,255,255,.12)';
  RR(VW-112, LY.btnY-25, 100, 50, 10); cx.fill();
  cx.strokeStyle='rgba(255,255,255,.2)'; cx.lineWidth=1; cx.stroke();
  T('▶', VW-62, LY.btnY, 'bold 22px Arial', rSel?'#fff':'rgba(255,255,255,.7)');

  // FIRE
  const canFire=G.frozen<=0 && !G.arrows.some(a=>!a.done);
  cx.fillStyle=canFire?'rgba(255,70,70,.8)':'rgba(80,80,80,.5)';
  RR(VW/2-62, LY.btnY-28, 124, 56, 14); cx.fill();
  if(canFire){
    SH('#FF6B6B',14);
    const pulse=Math.sin(G.tick*5)*.5+.5;
    cx.strokeStyle=`rgba(255,${120+Math.floor(pulse*80)},50,.8)`;
    cx.lineWidth=2; RR(VW/2-62, LY.btnY-28, 124, 56, 14); cx.stroke();
  }
  const FIRE_LABELS={rocket:'🔫 発射',arrow:'🏹 放つ！',rope:G._charging?'チャージ中…':'🤠 発射',net:'🎯 発射！',bugnet:'🦋 伸ばす！'};
  T(FIRE_LABELS[(WEAPONS[G.diff]||WEAPONS[0]).id]||'発射！', VW/2, LY.btnY, 'bold 18px Arial', canFire||G._charging?'#fff':'#555');
  NSH();
}

function drawHUD(){
  cx.fillStyle='rgba(4,6,28,.88)'; cx.fillRect(0,0,VW,LY.hudBot);
  cx.strokeStyle='rgba(255,255,255,.08)'; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(0,LY.hudBot); cx.lineTo(VW,LY.hudBot); cx.stroke();

  // Question box
  cx.fillStyle='rgba(255,255,255,.07)'; RR(10,7,VW-20,57,10); cx.fill();

  if(G.stage===1){
    T('小文字をゲット！', VW/2, 20, 'bold 13px Arial','rgba(180,200,255,.7)');
    SH('#FFD93D',20);
    T(G.question?.display||'?', VW/2, 52, 'bold 46px Arial','#FFD93D');
    NSH();
  } else {
    const w=G.question;
    T((w?.jp||'')+' → '+(w?.en||''), VW/2, 20, 'bold 13px Arial','rgba(180,200,255,.8)');
    const ans=w?.answer||'';
    const sx=VW/2-(ans.length*16)/2+8;
    for(let i=0;i<ans.length;i++){
      const col=i<G.letterIdx?'#6BCB77':i===G.letterIdx?'#FFD93D':'rgba(255,255,255,.25)';
      SH(i===G.letterIdx?'#FFD93D':'transparent',i===G.letterIdx?12:0);
      T(ans[i], sx+i*16, 52, 'bold 23px Arial', col);
    }
    NSH();
  }

  // Timer bar
  const tw=(VW-20)*(G.timer/G.timerMax);
  cx.fillStyle='rgba(255,255,255,.1)'; RR(10,70,VW-20,12,4); cx.fill();
  const _cdBlink=G.timer<=5 && Math.sin(G.tick*12)>0;
  const tc=G.timer<=5?(_cdBlink?'#FF0000':'rgba(200,0,0,.3)'):G.timer<20?'#FF6B6B':G.timer<40?'#FFD93D':'#6BCB77';
  cx.fillStyle=tc; RR(10,70,tw,12,4); cx.fill();

  // Score / time / combo
  SH(tc,6); T('⭐ '+G.score, 14, 92, 'bold 16px Arial','#fff','left'); NSH();
  T(Math.ceil(G.timer)+'秒', VW/2, 92, 'bold 14px Arial','rgba(255,255,255,.5)');
  if(G.combo>=3){
    const cc=G.combo>=10?'#FFD93D':G.combo>=5?'#6BCB77':'#4D96FF';
    SH(cc,8); T('×'+G.combo+' COMBO', VW-12, 92, 'bold 15px Arial',cc,'right'); NSH();
  }
}

function drawParts(){
  for(const p of G.parts){

    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill();

function _drawHorseSil(x,y,sc,dir,alpha){
  // dir: 1=右向き, -1=左向き
  // オフスクリーンキャンバスに描いてから貼る（globalAlpha重なり問題を回避）
  const OW=180, OH=190;
  const TC=document.createElement('canvas');
  TC.width=OW; TC.height=OH;
  const ot=TC.getContext('2d');
  const pivX=75, pivY=60;
  ot.save();
  ot.translate(pivX, pivY);
  ot.scale(dir, 1);
  const C='#1a0800';
  ot.fillStyle=C; ot.strokeStyle=C; ot.lineCap='round';

  // 胴体
  ot.beginPath(); ot.ellipse(0,0,34,17,0.08,0,Math.PI*2); ot.fill();
  // 首
  ot.beginPath(); ot.moveTo(20,-10); ot.bezierCurveTo(30,-18,32,-30,26,-34);
  ot.bezierCurveTo(20,-38,14,-28,16,-14); ot.closePath(); ot.fill();
  // 頭（細長い馬らしい形）
  ot.beginPath();
  ot.moveTo(18,-30);
  ot.bezierCurveTo(20,-44, 28,-48, 32,-48);
  ot.bezierCurveTo(38,-48, 44,-42, 44,-35);
  ot.bezierCurveTo(44,-28, 38,-22, 32,-22);
  ot.bezierCurveTo(26,-22, 18,-26, 18,-30);
  ot.closePath(); ot.fill();
  // 耳（2本の三角）
  ot.beginPath(); ot.moveTo(24,-46); ot.lineTo(20,-59); ot.lineTo(28,-52); ot.closePath(); ot.fill();
  ot.beginPath(); ot.moveTo(30,-47); ot.lineTo(27,-60); ot.lineTo(35,-53); ot.closePath(); ot.fill();
  // たてがみ
  ot.beginPath(); ot.moveTo(18,-14); ot.lineTo(20,-34); ot.lineTo(26,-34); ot.lineTo(22,-12); ot.closePath(); ot.fill();
  // しっぽ
  ot.lineWidth=5;
  ot.beginPath(); ot.moveTo(-30,-4); ot.bezierCurveTo(-42,4,-44,16,-38,22); ot.stroke();
  // 脚（ギャロップ）
  const lg=Math.sin(G.tick*9)*18;
  ot.lineWidth=6;
  ot.beginPath(); ot.moveTo(15,12); ot.lineTo(13+lg*.5,40); ot.stroke();
  ot.beginPath(); ot.moveTo(8,14);  ot.lineTo(6-lg*.4,40);  ot.stroke();
  ot.beginPath(); ot.moveTo(-16,12);ot.lineTo(-14-lg*.4,40);ot.stroke();
  ot.beginPath(); ot.moveTo(-22,12);ot.lineTo(-20+lg*.5,40);ot.stroke();
  // ライダー胴体
  ot.beginPath(); ot.ellipse(4,-28,9,14,0.1,0,Math.PI*2); ot.fill();
  // 頭
  ot.beginPath(); ot.arc(4,-44,7,0,Math.PI*2); ot.fill();
  // カウボーイハット（ブリム＋帽体）
  ot.beginPath(); ot.ellipse(4,-52,13,4,0,0,Math.PI*2); ot.fill();
  ot.beginPath(); ot.moveTo(-2,-52); ot.lineTo(10,-52); ot.lineTo(8,-64); ot.lineTo(0,-64); ot.closePath(); ot.fill();
  ot.restore();

  // まとめてアルファ適用して貼り付け
  cx.save();
  cx.globalAlpha=alpha??1;
  cx.drawImage(TC, x-pivX*sc, y-pivY*sc, OW*sc, OH*sc);
  cx.restore();
}

function drawHorseIntro(){
  const intro=G._intro; if(!intro) return;
  // 演出テキスト
  if(intro.phase==='pause'||intro.phase==='exit'){
    const txt=_INTRO_TEXT[G.diff]||_INTRO_TEXT[0];
    const fa=intro.phase==='pause'?1:Math.max(0,1-(intro.x-VW/2)/90);
    cx.save(); cx.globalAlpha=fa;
    SH('#FFD93D',24); T(txt[0],VW/2,VH/2-48,'bold 36px Arial Black,Arial','#FFD93D'); NSH();
    SH('#fff',10); T(txt[1],VW/2,VH/2,'bold 20px Arial','#fff'); NSH();
    cx.restore();
  }
  // 馬のシルエット（右向きで走り込む）
  _drawHorseSil(intro.x, LY.playerY-38, 1.3, 1, 1);
  // ほこり
  if(intro.phase!=='pause'){
    cx.save(); cx.globalAlpha=0.35; cx.fillStyle='#c8a070';
    for(let i=0;i<4;i++){
      const dx=(i-1.5)*22, dy=i%2*8;
      cx.beginPath(); cx.ellipse(intro.x-40+dx,LY.playerY+2+dy,10+i*4,5,0,0,Math.PI*2); cx.fill();
    }
    cx.restore();
  }
}

function drawTitle(){

  cx.font='28px Arial'; cx.textAlign='center'; cx.textBaseline='middle';

  cx.fillText('🐦‍⬛',birdX,CY.obsB);
  cx.fillText('🐦',((birdX+160)%(VW+80))-40,CY.obsB+5);
  cx.fillText('☁️',cloudX,CY.obsA);
  cx.fillText('⛅',((cloudX+170)%(VW+80))-40,CY.obsA-5);
  cx.globalAlpha=1;

  // ── 小文字 → 武器 ショーケース（バルーン） ──

  cx.strokeStyle='rgba(255,180,50,.28)'; cx.lineWidth=1; cx.stroke();

  const _wEmoji=['🔫','🤠','🏹','🎯','🦋'];
  const _si=Math.floor(G.tick*.22)%26;
  const _sc=['#FF6B6B','#FFD93D','#F5A030','#C0390A','#6BCB77'];
  const _sx=[48,144,240,336,432];
  const _uY=118, _lY=195;

  for(let i=0;i<5;i++){
    const li=(_si+i)%26;
    const lc=String.fromCharCode(97+li);
    const col=_sc[i];
    const px=_sx[i];
    const bU=Math.sin(G.tick*1.5+i*1.1)*7;
    const bL=Math.sin(G.tick*1.2+i*1.3+0.8)*5;

    cx.save();
    cx.globalAlpha=.5; cx.strokeStyle=col; cx.lineWidth=1.5;
    cx.setLineDash([3,4]);
    cx.beginPath(); cx.moveTo(px,_uY+bU+23); cx.lineTo(px,_lY+bL-22); cx.stroke();
    cx.setLineDash([]); cx.restore();
    // 小文字（上・丸バッジ）
    cx.save();
    cx.shadowColor=col; cx.shadowBlur=18;

    cx.fillStyle=col+'44'; cx.fill();
    cx.strokeStyle=col; cx.lineWidth=2.5; cx.stroke();
    cx.font="bold 26px 'Comic Sans MS',cursive";
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillStyle=col; cx.fillText(lc,px,_uY+bU);
    cx.restore();
    // 武器絵文字（下）
    cx.save();
    cx.shadowColor=col; cx.shadowBlur=14;
    cx.font='26px Arial'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(_wEmoji[i],px,_lY+bL);
    cx.restore();

  // タイトルパネル
  cx.fillStyle='rgba(0,0,0,.45)'; RR(16,230,VW-32,330,16); cx.fill();
  cx.strokeStyle='rgba(255,180,50,.5)'; cx.lineWidth=2; RR(16,230,VW-32,330,16); cx.stroke();

  cx.strokeStyle='rgba(255,180,50,.3)'; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(30,248); cx.lineTo(VW-30,248); cx.stroke();
  cx.beginPath(); cx.moveTo(30,546); cx.lineTo(VW-30,546); cx.stroke();
  cx.save();
  // 小さいカタカナサブタイトル
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.font='13px Arial';
  cx.fillStyle='rgba(255,220,120,.65)';
  cx.fillText('アルファベットゲット',VW/2,250);
  // ALPHABET
  cx.font='bold 46px Arial Black,Arial';
  cx.strokeStyle='#7a3800'; cx.lineWidth=6; cx.strokeText('ALPHABET',VW/2,278);
  cx.fillStyle='#FFD93D';  cx.fillText('ALPHABET',VW/2,278);
  // GET!
  cx.font='bold 68px Arial Black,Arial';
  cx.strokeStyle='#7a0000'; cx.lineWidth=8; cx.strokeText('GET!',VW/2,348);
  const grd=cx.createLinearGradient(0,314,0,382);
  grd.addColorStop(0,'#FF6B6B'); grd.addColorStop(1,'#FF3300');
  cx.fillStyle=grd; cx.fillText('GET!',VW/2,348);
  // ★ デコ ★
  cx.font='18px Arial'; cx.fillStyle='rgba(255,200,80,.7)';
  cx.fillText('★  ─  ─  ─  ─  ─  ─  ─  ─  ★',VW/2,390);
  NSH();
  BTN(VW/2,418,250,50,'▶  START!','#FF6B6B');
  BTN(VW/2,480,250,42,'📚 ステージを選ぶ','#4D96FF');
  BTN(VW/2,534,250,38,'❓ あそびかた','rgba(255,200,80,.7)');
  cx.fillStyle='rgba(255,255,255,.35)'; cx.font='12px Arial'; cx.textAlign='center';
  cx.fillText('記録  S1:'+G.best[0]+'点  /  S2:'+G.best[1]+'点',VW/2,588);
  cx.restore();

  // ── タイトル下部：馬に乗った人のシルエット ──

  cx.beginPath(); cx.moveTo(0,VH-52); cx.lineTo(VW,VH-52); cx.stroke();
  cx.restore();
  // メイン馬（右側、左向き）
  _drawHorseSil(VW*0.74, VH-52, 0.92, -1, 0.55);

  T('大文字→小文字',s1x+SW/2,SY+52,'12px Arial','rgba(200,220,255,.8)');
  T('記録 '+G.best[0]+'pt',s1x+SW/2,SY+72,'bold 11px Arial','#FFD93D');
  T('100点でボス！',s1x+SW/2,SY+88,'9px Arial','rgba(255,130,130,.7)');
  // S2（右）
  cx.fillStyle=s2sel?'rgba(107,203,119,.30)':'rgba(107,203,119,.10)';
  cx.strokeStyle=s2sel?'#88FFaa':'#6BCB77'; cx.lineWidth=s2sel?3:1.5;
  RR(s2x,SY,SW,SH2,12); cx.fill(); cx.stroke();
  if(s2sel){ SH('#88FFaa',8); T('▶ 選択中',s2x+SW-8,SY+14,'bold 10px Arial','#88FFaa','right'); NSH(); }
  T('✏️ ステージ 2',s2x+SW/2,SY+30,'bold 15px Arial',s2sel?'#fff':'rgba(255,255,255,.75)');
  T('スペルを順番に',s2x+SW/2,SY+52,'12px Arial','rgba(200,255,200,.8)');
  T('記録 '+G.best[1]+'pt',s2x+SW/2,SY+72,'bold 11px Arial','#FFD93D');
  T('ボス戦あり！',s2x+SW/2,SY+88,'9px Arial','rgba(130,255,130,.6)');

  // Weapon / level cards
  SH('rgba(255,255,255,.4)',4); T('道具（難易度）を選ぼう！',VW/2,160,'bold 13px Arial','rgba(255,255,255,.7)'); NSH();
  for(let i=0;i<WEAPONS.length;i++){
    const ww=WEAPONS[i];
    const by=172+i*42;
    const sel=G.diff===i;
    cx.fillStyle=sel?ww.color+'28':'rgba(255,255,255,.06)';
    cx.strokeStyle=sel?ww.color:'rgba(255,255,255,.13)';
    cx.lineWidth=sel?2:1;
    RR(16,by,VW-32,36,8); cx.fill(); cx.stroke();
    if(sel){ SH(ww.color,8); T('✓',VW-30,by+18,'bold 15px Arial',ww.color,'right'); NSH(); }
    T(ww.name,28,by+18,'bold '+(sel?14:13)+'px Arial',sel?ww.color:'rgba(255,255,255,.7)','left');
    T(ww.tag,VW-42,by+18,'11px Arial',sel?'rgba(255,255,255,.85)':'rgba(255,255,255,.35)','right');
  }
  // 5×42px → bottom y=382
  BTN(VW/2,408,220,44,'▶ ゲーム開始！','#FFD93D','#000');
  BTN(VW/2,462,160,36,'◀ 戻る','rgba(255,255,255,.1)');
  cx.restore();
}

// ════════════════════════════════════════════
//  SCREEN: RESULT
// ════════════════════════════════════════════
function drawResult(){
  drawBG();
  // 読みやすさ用オーバーレイ
  cx.fillStyle='rgba(0,20,80,.42)'; cx.fillRect(0,0,VW,VH);
  cx.save();
  cx.globalAlpha=1;

  // ── スコアボックス ───────────────────────────────
  SH('#FFD93D',20); T('TIME OVER',VW/2,40,'bold 28px Arial','#FFD93D'); NSH();
  cx.fillStyle='rgba(255,255,255,.07)'; RR(20,58,VW-40,118,14); cx.fill();
  T('スコア',VW/2,78,'bold 13px Arial','rgba(255,255,255,.45)');
  SH('#FFD93D',14); T(G.score+'点',VW/2,126,'bold 50px Arial','#FFD93D'); NSH();
  const si=G.stage-1;
  const sc=G.score;
  const[r,rc]=sc>=200?['S','#FFD93D']:sc>=120?['A','#6BCB77']:sc>=60?['B','#4D96FF']:sc>=20?['C','#FF9F43']:['D','#FF6B6B'];
  SH(rc,20); T(r, VW-56, 90, 'bold 60px Arial', rc); NSH();
  if(G.score>0 && G.score>=G.best[si]){
    SH('#FF6B6B',8); T('🎉 新記録！',VW/2,162,'bold 15px Arial','#FF6B6B'); NSH();
  } else {
    T('ベスト：'+G.best[si]+'点  コンボ：'+G.maxCombo+'×',VW/2,162,'12px Arial','rgba(255,255,255,.38)');
  }

  // ── 間違えた文字の復習 ───────────────────────────
  const wr=G.wrongAnswers||[];
  if(wr.length>0){
    T('間違えた文字を復習しよう！',VW/2,200,'bold 13px Arial','rgba(255,200,100,.85)');

    // 全文字をアイコン一覧で表示
    const cols=Math.min(wr.length,8);
    const step=Math.min(52,(VW-40)/cols);
    const startX=VW/2-(cols-1)*step/2;
    for(let i=0;i<wr.length;i++){
      const bx=startX+(i%cols)*step;
      const by=224+(Math.floor(i/cols)*44);
      const isActive=G._reviewIdx===i;
      if(isActive){
        const pulse=Math.abs(Math.sin(G.tick*4))*.6+.4;
        cx.fillStyle=`rgba(255,211,61,${0.18*pulse+0.08})`;
        cx.beginPath(); cx.arc(bx,by,22,0,Math.PI*2); cx.fill();
        SH('#FFD93D',20*pulse); T(wr[i].display,bx,by,'bold 28px Arial','#FFD93D'); NSH();
        // 小文字ラベル（発音される文字）
        T(wr[i].answer,bx,by+20,'bold 14px Arial','rgba(255,211,61,.7)');
      } else {
        cx.fillStyle='rgba(255,255,255,.08)';
        cx.beginPath(); cx.arc(bx,by,18,0,Math.PI*2); cx.fill();
        T(wr[i].display,bx,by,'bold 22px Arial','rgba(255,255,255,.45)');
      }
    }

    // 大きく光る現在の文字
    const rowCnt=Math.ceil(wr.length/cols);
    const reviewY=240+rowCnt*44+55;
    if(G._reviewIdx>=0 && G._reviewIdx<wr.length){
      const cur=wr[G._reviewIdx];
      const t=G.tick;
      const pulse2=Math.abs(Math.sin(t*3.5));
      const glow=80+Math.floor(pulse2*60);
      // 大文字と小文字を並べてダンス（位相ずらしで交互バウンス）
      const ux=VW/2-90;
      const lx=VW/2+90;
      const uy=reviewY+65+Math.sin(t*4)*14;
      const ly2=reviewY+65+Math.sin(t*4+1.4)*14;
      const uc=`rgba(255,${180+Math.floor(pulse2*60)},50,${0.7+pulse2*.3})`;
      SH('#FFD93D',glow);
      T(cur.display,ux,uy,'bold 90px Arial',uc);
      T(cur.answer,lx,ly2,"bold 90px 'Comic Sans MS',cursive",uc);
      NSH();
      T('♪',VW/2,reviewY+128,'22px Arial',`rgba(255,211,61,${pulse2})`);
    }

    const ry=Math.min(660, Math.max(610, 240+rowCnt*44+250));
    BTN(VW/2,ry,220,50,'▶ もういちど',rc);
    BTN(VW/2,ry+62,220,46,'🏠 スタートにもどる','rgba(100,150,255,.6)');
  } else {
    // 誤答なし — メッセージなし
    BTN(VW/2,400,220,50,'▶ もういちど',rc);
    BTN(VW/2,462,220,46,'🏠 スタートにもどる','rgba(100,150,255,.6)');
  }
  cx.restore();
}

// ════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════
function drawTimeout(){
  drawBG();
  drawObstacles(); drawPermObs(); drawBalloons();
  drawPlayer();
  // 暗いオーバーレイ
  cx.fillStyle='rgba(0,0,0,.55)'; cx.fillRect(0,0,VW,VH);
  const t=G._timeoutFlash;
  const pulse=Math.abs(Math.sin(G.tick*8));
  const scale=1+pulse*.06;
  cx.save();
  cx.translate(VW/2,VH/2-30);
  cx.scale(scale,scale);
  cx.textAlign='center'; cx.textBaseline='middle';
  // 影レイヤー
  cx.shadowColor='#FF3300'; cx.shadowBlur=60+pulse*40;
  cx.fillStyle=`rgba(255,${60+Math.floor(pulse*40)},0,${0.7+pulse*.3})`;
  cx.font='bold 80px Arial Black,Arial';
  cx.fillText('TIME',0,-44);
  cx.fillText('OUT!',0,44);
  cx.shadowBlur=0;
  // ハイライト
  cx.fillStyle=`rgba(255,220,50,${0.6+pulse*.4})`;
  cx.font='bold 80px Arial Black,Arial';
  cx.fillText('TIME',0,-44);
  cx.fillText('OUT!',0,44);
  cx.restore();
}
function render(){
  cx.clearRect(0,0,VW,VH);
  switch(G.screen){
    case 'title':
      drawTitle(); break;
    case 'rules':
      drawRules(); break;
    case 'mode':
      drawModeSelect(); break;
    case 'intro':
      drawBG();
      drawObstacles();
      cx.fillStyle='rgba(0,0,0,0.28)'; cx.fillRect(0,0,VW,VH);
      drawHorseIntro();
      drawParts(); drawLabels();
      break;
    case 'playing':
      drawBG();
      drawObstacles();
      drawPermObs();
      drawBalloons();
      drawTarget();
      drawAimLine();
      drawArrows();
      drawPlayer();
      drawHUD();
      drawParts(); drawLabels(); drawFrozen();
      break;
    case 'boss':
      drawBG();
      drawObstacles();
      drawPermObs();
      drawBalloons();
      drawTarget();
      drawAimLine();
      drawArrows();
      drawPlayer();
      drawBossHUD();
      drawParts(); drawLabels(); drawFrozen();
      break;
    case 'timeout':
      drawTimeout(); break;
    case 'result':
      drawResult(); break;
  }
}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
function getXY(e){
  const r=cv.getBoundingClientRect(), s=e.touches?e.touches[0]:e;
  return {x:(s.clientX-r.left)/SC, y:(s.clientY-r.top)/SC};
}

function onDown(px,py){
  ia();
  if(AC && AC.state==='suspended') AC.resume();

  if(G.screen==='title'){
    if(IB(px,py,VW/2,418,250,50)){ startGame(); return; }
    if(IB(px,py,VW/2,480,250,42)){ G.screen='mode'; return; }
    if(IB(px,py,VW/2,534,250,38)){ G.screen='rules'; return; }
    return;
  }
  if(G.screen==='rules'){
    if(IB(px,py,VW/2,562,200,42)){ G.screen='title'; return; }
    return;
  }
  if(G.screen==='mode'){
    if(IR(px,py,12,48,222,96)) G.stage=1;
    if(IR(px,py,246,48,222,96)) G.stage=2;
    for(let i=0;i<5;i++){ if(IR(px,py,16,172+i*42,VW-32,36)) G.diff=i; }
    if(IB(px,py,VW/2,408,220,44)){ startGame(); return; }
    if(IB(px,py,VW/2,462,160,36)){ G.screen='title'; return; }
    return;
  }
  if(G.screen==='playing'||G.screen==='boss'){
    // Stop button
    if(IR(px,py,8,LY.btnY-14,38,28)){ endGame(); return; }
    // Fire button
    if(IR(px,py,VW/2-62,LY.btnY-28,124,56)){ fireArrow(); return; }
    // Move left (shifted right to make room for stop button)
    if(IR(px,py,52,LY.btnY-25,76,50)){ G.keys.left=true; return; }
    // Move right
    if(IR(px,py,VW-112,LY.btnY-25,100,50)){ G.keys.right=true; return; }
    return;
  }
  if(G.screen==='result'){
    const wr=G.wrongAnswers||[];
    const rowCnt=Math.ceil(wr.length/Math.min(wr.length||1,8));
    const ry=wr.length>0?Math.min(660,Math.max(610,240+rowCnt*44+250)):400;
    if(IB(px,py,VW/2,ry,220,50)){ if(window.speechSynthesis) window.speechSynthesis.cancel(); startGame(); return; }
    if(IB(px,py,VW/2,ry+62,220,46)){ if(window.speechSynthesis) window.speechSynthesis.cancel(); G.screen='title'; stopBGM(); return; }
    // Tap a wrong letter to pronounce it immediately
    if(wr.length>0){
      const cols=Math.min(wr.length,8);
      const step=Math.min(52,(VW-40)/cols);
      const startX=VW/2-(cols-1)*step/2;
      for(let i=0;i<wr.length;i++){
        const bx=startX+(i%cols)*step;
        const by=224+(Math.floor(i/cols)*44);
        if(Math.hypot(px-bx,py-by)<22){ G._reviewIdx=i; G._reviewSpeakCount=1; G._reviewActive=true; G._reviewTimer=1.0; _reviewSpeak(wr[i]); return; }
      }
    }
    return;
  }
}

function onUp(){
  G.keys.left=false; G.keys.right=false;
}

cv.addEventListener('mousedown', e=>{ const p=getXY(e); onDown(p.x,p.y); });
cv.addEventListener('mouseup',   ()=>onUp());
cv.addEventListener('touchstart', e=>{ e.preventDefault(); const p=getXY(e); onDown(p.x,p.y); },{passive:false});
cv.addEventListener('touchend',   e=>{ e.preventDefault(); onUp(); },{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  G.keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') G.keys.right=true;
  if((e.key===' '||e.key==='Enter')&&(G.screen==='playing'||G.screen==='boss')){
    e.preventDefault(); fireArrow();
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  G.keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') G.keys.right=false;
});

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,.05);
  lastT=t;
  update(dt);
  render();
}
requestAnimationFrame(t=>{ lastT=t; requestAnimationFrame(loop); });
</script>
