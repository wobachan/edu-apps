<style>
.game-section{
    margin-top:60px;
    padding-top:20px;
    border-top:3px solid #e5e7eb;
}


    
body{
    font-family:sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:0;
}

header{
    background:#4f46e5;
    color:white;
    text-align:center;
    padding:40px 20px;
}

h1{
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-decoration:none;
    color:black;
}

.card:hover{
    transform:translateY(-4px);
}

.tag{
    display:inline-block;
    background:#eef2ff;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:10px;
}


.game-image{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:12px;
}
    
</style>

</html>



<body>

<header>
    <h1>わだおばちゃんの学習アプリひろば</h1>
    <p>たのしく学べる！ブラウザであそべる！</p>
</header>

<div class="container">

    <!-- ===== 第１セクション ===== -->

    <section class="game-section">

        <div class="grid">

            <!-- ごうぴい -->
            <a class="card" href="gopijupi/">

                <img src="gopijupi.png" class="game-image">

                <div class="tag">算数</div>

                <h2>はしれ！ごうぴい＆じゅうぴい</h2>

                <p>5はいくつといくつ？あといくつで10？を楽しく！</p>

            </a>


            <!-- かずつなぎ -->
            <a class="card" href="kazutsunagi/">

                <img src="kazutsunagitop.png" class="game-image">

                <div class="tag">算数</div>

                <h2>かずつなぎ</h2>

                <p>つないで　けして　数パズル</p>

            </a>


            <!-- ぐらぐらバナナ -->
            <a class="card" href="guragura-banana/">

                <img src="guragura-banana.png" class="game-image">

                <div class="tag">算数</div>

                <h2>ぐらぐらバナナ</h2>

                <p>半分にわけて　バランスとれるかな</p>

            </a>

        </div>

    </section>


    <!-- ===== 第２セクション ===== -->

    <section class="game-section">

        <div class="grid">

            <!-- アルファベットゲット -->
            <a class="card" href="alphabet-get/">

                <img src="alphabet-get.png" class="game-image">

                <div class="tag">英語</div>

                <h2>アルファベットゲット！</h2>

                <p>大文字と小文字　どのアイテムでとる？</p>

            </a>

        </div>

    </section>


    <!-- ===== 第３セクション（将来用）===== -->

    <section class="game-section">

        <div class="grid">

            <!-- 今後追加 -->

        </div>

    </section>



    <!-- ===== 第４セクション ===== -->

    <section class="game-section">

        <div class="grid">

            <!-- わだおばチャンネル -->
            <a class="card" href="https://www.youtube.com/watch?v=0VxxwyWTiEw&list=PL4DKHW_cU6KQdtpfWBi1Fe5RYgfN-RuWf">

                <img src="wadaobachannel-kuku.png" class="game-image">

                <div class="tag">算数</div>

                <h2>九九の歌　オリジナルソング</h2>

                <p>「こんなのほしかった！」を　じつげん</p>

            </a>

        </div>

    </section>


    
</div>
