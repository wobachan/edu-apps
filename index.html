<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:0;
}

header{
    background:#4f46e5;
    color:white;
    text-align:center;
    padding:40px 20px;
}

h1{
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-decoration:none;
    color:black;
}

.card:hover{
    transform:translateY(-4px);
}

.tag{
    display:inline-block;
    background:#eef2ff;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:10px;
}


.game-image{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:12px;
}
    
</style>
</head>

<body>

<header>
<h1>わだおばちゃんの学習アプリひろば</h1>
<p>たのしく学べる！ブラウザであそべる！</p>
</header>

<div class="container">

<div class="grid">

<a class="card" href="https://wobachan.github.io/edu-apps/gopijupi/">
<img src="gopijupi.png" class="game-image">
<div class="tag">算数</div>
<h2>はしれ！ごうぴい＆じゅうぴい</h2>
<p>5はいくつといくつ？あといくつで10？を楽しく！</p>
</a>

    
<a class="card" href="https://wobachan.github.io/edu-apps/kazutsunagi/">
<img src="kazutsunagitop.png" class="game-image">
<div class="tag">算数</div>
<h2>かずつなぎ</h2>
<p>数をつないで消していくゲーム</p>
</a>


</div>

</div>

</body>
</html>
