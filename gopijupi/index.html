    // within each group of 5: 0,2,4 → 5; 1,3 → 10  (or randomised)
    const posInGroup = qIdx % 5;
    return (posInGroup % 2 === 0) ? 5 : 10;
  }

  // ---- Build the road ----
  // A long strip: a few flat columns at the start, then alternating
  // flat / problem columns. Each "problem" column has a random missing amount.
  function buildTrack() {
    roadStrip.innerHTML = '';
    state.cols = [];

    const flatStart = 4;
    // tighter gap on level 1 B/C/D to make those tiers feel faster;
    // level 2/3 always use the default 4 (harder math needs more reaction time)
    // same gap for all levels — set by speed tier
    const flatBetween = (state.mainLevel === 5 ? FLAT_BETWEEN_BY_TIER_L5 : FLAT_BETWEEN_BY_TIER)[state.speedTier] ?? 4;
    const totalCols = flatStart + state.totalQuestions * (1 + flatBetween) + 30;

    let problemsPlaced = 0;
    let prevMissing = null;
    let lastProblemColIndex = -1;
    for (let i = 0; i < totalCols; i++) {
      let colData;
      const isProblemSlot = (i >= flatStart) &&
        ((i - flatStart) % (1 + flatBetween) === 0) &&
        problemsPlaced < state.totalQuestions;

      if (isProblemSlot) {
        const qIdx = problemsPlaced;
        // level 5: l5target holds the actual question target (5 or 10)
        const l5target = (state.mainLevel === 5) ? l5TargetFor(qIdx) : state.roadHeight;
        const roadTarget = state.roadHeight;
        const missing = randomMissing5(null, l5target);
        prevMissing = missing;
        const isL5 = state.mainLevel === 5;
        colData = {
          target: roadTarget,
          // lv4/5: flat road (no visible hole) — abstract mode
          height: isL5 ? roadTarget : (state.mainLevel === 4 ? roadTarget : roadTarget - missing),
          missing: missing,
          splitKnown: l5target - missing,
          l5target: l5target,
          isProblem: true,
          solved: false,
          l5style: isL5 ? l5StyleFor(qIdx) : null,
        };
        problemsPlaced++;
        lastProblemColIndex = i;
      } else {
        colData = {
          target: state.roadHeight,
          height: state.roadHeight,
          missing: 0,
          splitKnown: state.roadHeight,
          isProblem: false,
          solved: true
        };
      }
      state.cols.push(colData);
      roadStrip.appendChild(renderColumn(colData));
    }

    // place the goal gate a couple of columns after the final question, so
    // Cubie has somewhere to walk to once the last problem is solved
    state.goalColIndex = lastProblemColIndex + 3;
    state.goalEntered = false;
    // gate and friend are visible from game start — waiting at the goal
    goalGate.classList.add('show');
    const friend = document.getElementById('car-friend');
    friend.style.display = 'block';
    friend.style.width  = (state.cubiePx || 48) + 'px';
    friend.style.height = (state.cubiePx || 48) + 'px';
    friend.classList.remove('pop-in', 'celebrating');
  }

  // pick a random complement in [1, target-1], avoiding repeating the previous value
  function randomMissing5(prevMissing, target) {
    target = target || state.roadHeight;
    const maxVal = target - 1;
    if (maxVal <= 1) return 1;

    if (target === 10 && (state.mainLevel === 2 || state.mainLevel === 3 || state.mainLevel === 5)) {
      const pool = [
        3,
        4,
        5,
        6, 6,
        7, 7,
        8, 8,
        9,
      ];
      let pick;
      let tries = 0;
      do {
        pick = pool[Math.floor(Math.random() * pool.length)];
        tries++;
      } while (pick === prevMissing && tries < 20);
      return pick;
    }

    // default: uniform 1..maxVal, no repeat
    let missing;
    let tries = 0;
    do {
      missing = 1 + Math.floor(Math.random() * maxVal);
      tries++;
    } while (missing === prevMissing && tries < 20);
    return Math.max(1, Math.min(missing, maxVal)); // 必ず1以上、maxVal以下
  }

  function renderColumn(colData) {
    const col = document.createElement('div');
    col.className = 'col';

    // Level 3 (new "まとめ" mode): ALL columns use num-rect;
    // problem columns also have dark hole blocks above the rect
    if (state.mainLevel === 3) {
      const rect = document.createElement('div');
      rect.className = 'num-rect';
      rect.style.height = `calc(var(--block-size) * ${colData.height})`;
      // show the number: problem columns show filled count, flat columns show "10"
      if (colData.height > 0) rect.textContent = colData.height;
      col.appendChild(rect);
      // missing blocks on top (problem columns only)
      for (let h = colData.height; h < colData.target; h++) {
        const block = document.createElement('div');
        block.className = 'block missing';
        block.dataset.missingSlot = '1';
        if (h === colData.height)       block.classList.add('missing-bottom');
        if (h === colData.target - 1)   block.classList.add('missing-top');
        col.appendChild(block);
      }
      return col;
    }

    // Level 2: 元のブロック表示（全列ブロック積み）
    if (state.mainLevel === 2) {
      const halfLineIndex = Math.floor(colData.target / 2) - 1;
      for (let h = 0; h < colData.target; h++) {
        const block = document.createElement('div');
        block.className = 'block';
        if (h >= colData.height) {
          block.classList.add('missing');
          block.dataset.missingSlot = '1';
          if (h === colData.height) block.classList.add('missing-bottom');
          if (h === colData.target - 1) block.classList.add('missing-top');
        }
        if (h === halfLineIndex) block.classList.add('half-mark');
        col.appendChild(block);
      }
      return col;
    }

    // Level 4/5: abstract mode — no visible gaps, flat road
    const displayHeight = (state.mainLevel === 4 || state.mainLevel === 5)
                          ? colData.target : colData.height;

    // half-line guide: only in level 2
    const halfLineIndex = (state.mainLevel === 2) ? (Math.floor(colData.target / 2) - 1) : -1;

    for (let h = 0; h < colData.target; h++) {
      const block = document.createElement('div');
      block.className = 'block';
      if (h >= displayHeight) {
        block.classList.add('missing');
        block.dataset.missingSlot = '1';
        if (h === displayHeight) block.classList.add('missing-bottom');
        if (h === colData.target - 1) block.classList.add('missing-top');
      }
      if (h === halfLineIndex) {
        block.classList.add('half-mark');
      }
      col.appendChild(block);
    }
    return col;
  }

  // ---- Main animation loop ----
  function frame(now) {
    if (state.lastTime === null) state.lastTime = now;
    // cap dt at 100 ms — if a frame takes longer (tab hidden, slow device,
    // GC pause…) the car would jump multiple columns in one step and could
    // leap clean over a hole without triggering its fall check
    const dt = Math.min((now - state.lastTime) / 1000, 0.1);
    state.lastTime = now;

    if (state.running) {
      const prevColIndex = Math.floor(state.scrollX);
      state.scrollX += state.scrollSpeedCols * dt;
      const colIndex = Math.floor(state.scrollX);

      if (colIndex !== prevColIndex) {
        if (colIndex >= domColStart + state.cols.length - 1) {
          if (state.challengeMode) { challengeExtendRoad(); }
          else {
            // check goal gate before stopping
            if (!state.goalEntered && state.goalColIndex !== null &&
                goalGate.classList.contains('show') &&
                state.scrollX >= state.goalColIndex + 0.3) {
              enterGoalGate();
            } else {
              stopDriving(); renderAll(); return;
            }
          }
        }
      }

      // check whether we should warn about an upcoming problem
      checkWarning();

      // if a problem was deferred during the post-correct cooldown, activate
      // it now that the cooldown has elapsed
      if (!state.locked &&
          state.pendingProblemIndex >= 0 &&
          performance.now() >= state.correctCooldownUntil) {
        const pIdx = state.pendingProblemIndex;
        state.pendingProblemIndex = -1;
        const pcol = colAt(pIdx);
        if (pcol && pcol.isProblem && !pcol.solved) {
          activateProblem(pIdx);
        }
      }

      // the fall triggers when Cubie's leading foot just starts to reach
      // the hole's edge — judged by distance, not elapsed time, so it's
      // tied directly to what's on screen (the timer bar uses the same
      // distance-based calculation, see updateTimerBar, so the two always
      // line up exactly)
      if (state.activeProblemIndex >= 0 && state.timerStart !== null &&
          performance.now() > state.correctCooldownUntil) {
        const fallCol = colAt(state.activeProblemIndex);
        if (fallCol && fallCol.solved) {
          state.activeProblemIndex = -1;
          state.timerStart = null;
        } else {
          const distanceToHole = state.activeProblemIndex - state.scrollX;
          // activate直後（じゅうぴいがまだ穴に向かって歩き始めていない）に
          // 誤ってtriggerFallしないよう、activate時点より距離が縮まった場合のみ発火
          const hasApproached = distanceToHole < state.activatedDistanceToHole - 0.05;
          if (distanceToHole <= fallLeadCols() && hasApproached) {
            triggerFall(state.activeProblemIndex);
            return;
          }
        }
      }

      // check whether Cubie has reached the goal gate (only relevant after
      // the final question has been solved and the gate has been revealed)
      if (!state.goalEntered && state.goalColIndex !== null && goalGate.classList.contains('show') &&
          state.scrollX >= state.goalColIndex + 0.3) {
        enterGoalGate();
      }

      renderAll();
      updateTimerBar();
    }

    state.rafId = requestAnimationFrame(frame);
  }

  // Cubie reaches the goal gate: keep walking right on past it (no stopping
  // or shrinking) for a beat, then show the results screen
  function enterGoalGate() {
    state.goalEntered = true;
    spawnGoalStars();
    Sound.SFX.goal();
    setTimeout(() => {
      stopDriving();
      // friend is already there — both celebrate immediately
      car.classList.add('celebrating');
      const friend = document.getElementById('car-friend');
      if (friend) friend.classList.add('celebrating');
      spawnCelebrationHearts();
      Sound.SFX.join();
      showSpeechBubble('うれしいぴぃぃ🎉', 2000, null, true);
      setTimeout(() => { showClear('complete'); }, 2200);
    }, 600);
  }

  function startCelebration() {
    const cpx = state.cubiePx || 48;
    const friend = document.getElementById('car-friend');

    // size the friend the same as Cubie
    friend.style.width  = cpx + 'px';
    friend.style.height = cpx + 'px';
    // position the friend to Cubie's right, at the same road height
    friend.style.left   = (carLeftPx() + cpx * 1.7) + 'px';
    friend.style.bottom = car.style.bottom;
    friend.style.display = 'block';

    // pop friend in, then both bounce with joy
    requestAnimationFrame(() => {
      setTimeout(() => {
        friend.classList.add('pop-in');
        Sound.SFX.join();
      }, 100);
      setTimeout(() => {
        car.classList.add('celebrating');
        friend.classList.add('celebrating');
        spawnCelebrationHearts();
        showSpeechBubble('うれしいぴぃぃ🎉', 2000, null, true);
      }, 700);
    });

    // show results after the celebration
    setTimeout(() => {
      showClear('complete');
    }, 2600);
  }

  function spawnCelebrationHearts() {
    const heartEmojis = ['❤️','💛','💚','💙','💜','🌟','✨'];
    const track = document.getElementById('track');
    const cpx = state.cubiePx || 48;
    const baseX = carLeftPx();
    const baseY = parseFloat(car.style.bottom) + cpx;

    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'cel-heart';
        h.textContent = heartEmojis[i % heartEmojis.length];
        const spread = cpx * 1.7;  // span both characters
        h.style.left   = (baseX - cpx * 0.3 + Math.random() * spread) + 'px';
        h.style.bottom = (baseY + Math.random() * 20) + 'px';
        h.style.fontSize = (14 + Math.random() * 10) + 'px';
        track.appendChild(h);
        setTimeout(() => h.remove(), 1500);
      }, i * 130);
    }
  }

  // the instant Cubie reaches the goal, a shower of stars falls from the
  // two clouds flanking the rainbow
  // show a speech bubble above Cubie (or the given element) for a moment
  function showSpeechBubble(text, durationMs = 2600, targetEl = null, goalMode = false) {
    targetEl = targetEl || car;
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.textContent = text;

    if (goalMode) {
      // ゴール用: 画面左側に固定表示、右向き吹き出し（キャラは右にいる）
      bubble.classList.add('goal-bubble');
      bubble.style.animationDuration = durationMs + 'ms';
      // scene配下でもfixed配置はviewport基準なのでsceneに追加でOK
      const scene = document.getElementById('scene');
      scene.appendChild(bubble);
    } else {
      const cpx = state.cubiePx || 48;
      const carLeft = parseFloat(targetEl.style.left) || carLeftPx();
      const carBottom = parseFloat(targetEl.style.bottom) || 0;
      bubble.style.left   = (carLeft + cpx * 0.5) + 'px';
      bubble.style.bottom = (carBottom + cpx * 1.5) + 'px';
      bubble.style.animationDuration = durationMs + 'ms';
      const scene = document.getElementById('scene');
      scene.appendChild(bubble);
    }
    setTimeout(() => bubble.remove(), durationMs + 100);
  }

  function spawnGoalStars() {
    const scene = goalGate.querySelector('.gate-scene');
    if (!scene) return;
    const cloudSpots = [
      { left: '6%' }, { left: '18%' },
      { left: '82%' }, { left: '94%' },
      { left: '40%' }, { left: '60%' },
    ];
    cloudSpots.forEach((spot, i) => {
      setTimeout(() => {
        const star = document.createElement('div');
        star.className = 'goal-star';
        star.style.left = spot.left;
        star.style.top = '6%';
        star.style.setProperty('--star-fall-dist', (140 + Math.random() * 90) + 'px');
        star.style.setProperty('--star-spin', (Math.random() * 360 - 180) + 'deg');
        star.style.fontSize = (14 + Math.random() * 10) + 'px';
        scene.appendChild(star);
        setTimeout(() => star.remove(), 1400);
      }, i * 90);
    });
  }

  function startDriving() {
    car.classList.add('driving');
    if (state.running) return;
    state.running = true;
    state.lastTime = null;
    if (state.rafId === null) {
      state.rafId = requestAnimationFrame(frame);
    }
  }

  function stopDriving() {
    state.running = false;
    state.rafId = null;
    car.classList.remove('driving');
  }

  function checkWarning() {
    if (state.locked) return;
    // start searching slightly BEHIND the car so that any problem column
    // skipped in a single large frame (due to lag) is never missed
    const searchFrom = Math.max(domColStart, Math.floor(state.scrollX) - 2);
    for (let i = searchFrom; i < domColStart + state.cols.length; i++) {
      const col = colAt(i);
      if (!col) break;
      if (col.isProblem && !col.solved) {
        const distance = i - state.scrollX;
        if (distance <= state.warningDistanceCols) {
          // if within the post-correct cooldown window, defer the activation
          // so scrollX doesn't race past before the panel opens
          if (performance.now() < state.correctCooldownUntil) {
            state.pendingProblemIndex = i;   // remember for later
          } else {
            state.pendingProblemIndex = -1;
            activateProblem(i);
          }
        }
        return;
      }
    }
  }

  // pre-build the answer buttons (disabled) so they're always visible from
  // the moment the game starts — activateProblem() re-wires their handlers
  // and enables them when a question appears
  function initAnswerButtons() {
    const target = state.roadHeight;  // 5 for level 1, 10 for level 2/3
    const count = target - 1;         // 4 buttons for level 1, 9 for level 2/3
    answersEl.innerHTML = '';
    const maxPerRow = 5;
    let rows;
    if (count <= maxPerRow) {
      rows = [count];
    } else {
      const firstRow = Math.ceil(count / 2);
      rows = [firstRow, count - firstRow];
    }
    let num = 1;
    rows.forEach(rowCount => {
      const rowEl = document.createElement('div');
      rowEl.className = 'ans-row';
      for (let i = 0; i < rowCount; i++) {
        const n = num++;
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = n;
        btn.disabled = true;  // enabled by buildAnswerButtons when a question fires
        rowEl.appendChild(btn);
      }
      answersEl.appendChild(rowEl);
    });
  }

  function activateProblem(colIndex) {
    if (state.activeProblemIndex === colIndex && state.timerStart !== null) return;
    state.activeProblemIndex = colIndex;
    state.timerStart = performance.now();
    // activate時点の穴までの距離を記録。これより近い距離でのtriggerFallは
    // 「正解直後に次問がactivateされた瞬間の誤発火」なので無視する。
    state.activatedDistanceToHole = colIndex - state.scrollX;
    state.locked = true;
    if (state.mistakeColIndex !== colIndex) {
      state.mistakeColIndex = colIndex;
      state.questionHadMistake = false;
      state.hadFallThisQuestion = false;
    }
    showQuestion(colAt(colIndex), colIndex);
  }

  function updateTimerBar() {
    if (state.activeProblemIndex < 0 || state.timerStart === null) return;
    // mirror the same distance-based measure used to trigger the fall, so
    // the bar reaching empty always lines up exactly with the moment
    // Cubie's foot reaches the hole
    const distanceToHole = state.activeProblemIndex - state.scrollX;
    const leadCols = fallLeadCols();
    const usableDistance = state.warningDistanceCols - leadCols;
    const remaining = Math.max(0, Math.min(1, (distanceToHole - leadCols) / usableDistance));
    timerFill.style.width = (remaining * 100) + '%';
    timerFill.classList.toggle('urgent', remaining < 0.3);
  }

  // car reaches the gap without it being filled -> drop down, then retreat & retry
  function triggerFall(colIndex) {
    const col = colAt(colIndex);
    // if the player answered correctly just before this frame ran,
    // col.solved is already true — don't penalise them
    if (col && col.solved) {
      state.activeProblemIndex = -1;
      state.timerStart = null;
      return;
    }
    stopDriving();
    state.questionHadMistake = true;

    if (state.challengeMode) {
      car.classList.add('fall');
      state.locked = true;
      state.pendingProblemIndex = -1;   // pending中の次問をクリア
      state.activeProblemIndex = -1;
      state.correctCooldownUntil = performance.now() + 5000;
      document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
      showFeedback('ざんねん！💦', false);
      Sound.SFX.fall();
      setTimeout(() => {
        car.classList.remove('fall');
        hideFeedback();
        challengeGameOver();
      }, 1300);
      return;
    }

    // lock out any further answer immediately — once the fall has started,
    // even a click that lands a split-second later must NOT be able to
    // count as solving it. Without this, a "just barely too late" click
    // could race past this check and get accepted as correct.
    document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

    if (state.mainLevel === 4 || state.mainLevel === 5) {
      // abstract mode: no visible hole, so just a "miss" beat — no fall animation
      showFeedback('ぴいぃぃ！', true);
      Sound.SFX.wrong();
    } else {
      // a real fall happened — earns Cubie a band-aid once solved
      state.hadFallThisQuestion = true;
      car.classList.add('fall');
      showFeedback('ぴいぃぃ！', true);
      Sound.SFX.fall();
    }

    // retreat and retry the same problem (the game never ends from a fall —
    // the player keeps trying until they get it right)
    setTimeout(() => {
      // a correct click may have landed right at the buzzer and already
      // solved this problem before this callback ran (the timer-expiry
      // check and the click handler can race). If so, don't re-show or
      // retreat — just resume driving, otherwise the player gets stuck on
      // a "solved" question whose buttons silently do nothing.
      if (col.solved) {
        // clean up the visual "fallen" state too (remove the tilt/offset
        // and the "もう一度" feedback) — otherwise Cubie keeps walking
        // around at the bottom of the hole even though it's solved
        car.classList.remove('fall');
        hideFeedback();
        startDriving();
        return;
      }

      car.classList.remove('fall');
      hideFeedback();

      state.scrollX = Math.max(0, colIndex - state.retreatCols);
      state.activeProblemIndex = -1;
      state.timerStart = null;
      renderAll();

      setTimeout(() => {
        if (col.solved) {
          startDriving();
          return;
        }
        activateProblem(colIndex);
        startDriving();
      }, 250);
    }, 1150);
  }

  // helper: hide all level-5 diagrams
  function hideL5Diagrams() {
    document.querySelectorAll('.l5-diagram').forEach(d => d.classList.remove('show'));
  }

  // ---- Question panel ----
  function showQuestion(col, colIndex) {
    // colが取得できない・不正値の場合は表示しない
    if (!col || col.solved) return;
    const target = (state.mainLevel === 5 && col.l5target != null) ? col.l5target : (col.target || state.roadHeight);
    if (!col.missing || col.missing <= 0 || col.missing >= target) {
      console.warn('showQuestion: invalid col.missing', col.missing, 'target', target, 'colIndex', colIndex);
      return;
    }

    panel.classList.add('show');
    // timer bar for level 4 and level 5 (no visible hole to gauge distance)
    if (state.mainLevel === 4 || state.mainLevel === 5) {
      timerTrack.classList.add('show');
    } else {
      timerTrack.classList.remove('show');
    }
    timerFill.style.width = '100%';
    timerFill.classList.remove('urgent');

    const known  = col.splitKnown;

    hideL5Diagrams();

    if (state.mainLevel === 4) {
      splitTarget.textContent = target;
      splitKnown.textContent  = known;
      splitDiagram.classList.add('show');
    } else if (state.mainLevel === 5) {
      splitDiagram.classList.remove('show');
      const style = col.l5style;
      // knownIsLeft: true(default) = □左・既知右, false = 既知左・□右
      // (for challenge mode, this is randomised to increase difficulty)
      const knownLeft = col.knownIsLeft !== false;  // default: unknown on left

      if (style === 'cherry-up') {
        document.getElementById('l5cu-total').textContent   = target;
        // left circle: □ if knownLeft, else known
        document.getElementById('l5cu-unknown').textContent = '';
        document.getElementById('l5cu-known').textContent   = known;
        // swap DOM order of the two circles
        const pair = document.querySelector('#l5-cherry-up .cherry-pair');
        if (pair) {
          const [left, right] = pair.children;
          if (!knownLeft) {
            // □ right, known left — swap
            left.classList.remove('unknown'); left.textContent = known;
            right.classList.add('unknown');   right.textContent = '';
            // sync IDs
            left.id = 'l5cu-known'; right.id = 'l5cu-unknown';
          } else {
            left.classList.add('unknown');    left.textContent = '';
            right.classList.remove('unknown'); right.textContent = known;
            left.id = 'l5cu-unknown'; right.id = 'l5cu-known';
          }
        }
        document.getElementById('l5-cherry-up').classList.add('show');
      } else if (style === 'cherry-down') {
        document.getElementById('l5cd-total').textContent   = target;
        const pair = document.querySelector('#l5-cherry-down .cherry-pair');
        if (pair) {
          const [left, right] = pair.children;
          if (!knownLeft) {
            left.classList.remove('unknown'); left.textContent = known;
            right.classList.add('unknown');   right.textContent = '';
            left.id = 'l5cd-known'; right.id = 'l5cd-unknown';
          } else {
            left.classList.add('unknown');    left.textContent = '';
            right.classList.remove('unknown'); right.textContent = known;
            left.id = 'l5cd-unknown'; right.id = 'l5cd-known';
          }
        }
        document.getElementById('l5-cherry-down').classList.add('show');
      } else if (style === 'tape2') {
        document.getElementById('l5t2-total-num').textContent = target;
        // swap known/□ bars based on knownLeft, and set flex ratio = known : missing
        const missing2 = target - known;
        const partsRow = document.querySelector('#l5-tape2 .tape2-parts-row');
        if (partsRow) {
          const [left, right] = partsRow.children;
          if (!knownLeft) {
            // known left, □ right
            left.className  = 'tape-bar known';      left.style.flex = known;
            left.querySelector('.tape-inner-num').textContent  = known;
            left.id = 'l5t2-known-bar';
            right.className = 'tape-bar unknown-box'; right.style.flex = missing2;
            right.querySelector('.tape-inner-num').textContent = '□';
          } else {
            // □ left, known right
            left.className  = 'tape-bar unknown-box'; left.style.flex = missing2;
            left.querySelector('.tape-inner-num').textContent  = '□';
            right.className = 'tape-bar known';       right.style.flex = known;
            right.querySelector('.tape-inner-num').textContent = known;
            right.id = 'l5t2-known-bar';
          }
        }
        document.getElementById('l5-tape2').classList.add('show');
      } else { // tape1: 上段=既知+□バー（数字はバー内）、下段=合計バー
        const barRow = document.querySelector('#l5-tape1 .t1-bar-row');
        if (barRow) {
          const [left, right] = barRow.children;
          if (!knownLeft) {
            // known left, □ right
            left.className  = 'tape-bar known t1-known-seg';   left.style.flex = known;
            left.querySelector('.tape-inner-num').textContent = known; left.querySelector('.tape-inner-num').style.color = '';
            right.className = 'tape-bar unknown-box t1-unknown-seg'; right.style.flex = (target - known);
            right.querySelector('.tape-inner-num').textContent = '□'; right.querySelector('.tape-inner-num').style.color = 'var(--bot-accent-dark)';
          } else {
            // □ left, known right
            left.className  = 'tape-bar unknown-box t1-unknown-seg'; left.style.flex = (target - known);
            left.querySelector('.tape-inner-num').textContent = '□';  left.querySelector('.tape-inner-num').style.color = 'var(--bot-accent-dark)';
            right.className = 'tape-bar known t1-known-seg';  right.style.flex = known;
            right.querySelector('.tape-inner-num').textContent = known; right.querySelector('.tape-inner-num').style.color = '';
          }
        }
        document.getElementById('l5t1-total-num').textContent = target;
        document.getElementById('l5-tape1').classList.add('show');
      }
    } else {
      splitDiagram.classList.remove('show');
    }

    buildAnswerButtons(col.missing, target, col, colIndex);
  }

  // fixed answer buttons: 1, 2, ..., (target - 1), all shown at once
  function buildAnswerButtons(correctAnswer, target, col, colIndex) {
    answersEl.innerHTML = '';
    // missingが0以下や不正値のときは問題をスキップ（表示しない）
    if (!correctAnswer || correctAnswer <= 0 || correctAnswer >= target) {
      console.warn('buildAnswerButtons: invalid correctAnswer', correctAnswer, 'target', target);
      return;
    }
    const count = target - 1;

    // split into at most two rows, as evenly as possible, so a count like 9
    // becomes 5+4 instead of wrapping unevenly (e.g. 7+2)
    const maxPerRow = 5;
    let rows;
    if (count <= maxPerRow) {
      rows = [count];
    } else {
      const firstRow = Math.ceil(count / 2);
      rows = [firstRow, count - firstRow];
    }

    let num = 1;
    rows.forEach(rowCount => {
      const rowEl = document.createElement('div');
      rowEl.className = 'ans-row';
      for (let i = 0; i < rowCount; i++) {
        const n = num++;
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = n;
        btn.addEventListener('click', () => handleAnswer(n, correctAnswer, btn, col, colIndex));
        rowEl.appendChild(btn);
      }
      answersEl.appendChild(rowEl);
    });
  }

  function handleAnswer(selected, correct, btn, col, colIndex) {
    if (!state.locked) return;
    if (btn.disabled) return;
    if (col.solved) return; // already fixed (e.g. timer fired right as they clicked)
    Sound.resume();
    document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);

    if (selected === correct) {
      btn.classList.add('correct');
      onCorrect(col, colIndex);
    } else {
      btn.classList.add('wrong');
      onWrong(col, colIndex);
    }
  }

  // reveal the next unused band-aid on Cubie's face (capped at 3) — called
  // when a problem that involved a real fall is finally solved, i.e. the
  // moment Cubie is "revived" by the blocks filling back in underneath it
  const BANDAID_MAX = 3;
  function addBandaid() {
    if (state.bandaidCount >= BANDAID_MAX) return;
    state.bandaidCount++;
    const el = car.querySelector('.bandaid-' + state.bandaidCount);
    if (el) el.classList.add('show');
  }

  function onCorrect(col, colIndex) {
    // if a fall animation/pose is still active (the player answered right
    // as — or just after — the timer expired), clear it immediately and
    // make sure driving is (re)started, so Cubie doesn't stay stuck,
    // frozen, at the bottom of the hole
    car.classList.remove('fall');
    startDriving();

    const hadMistake = state.questionHadMistake;
    const hadFall = state.hadFallThisQuestion;
    if (hadFall) {
      // make the band-aid moment obvious with its own feedback message,
      // instead of the normal "せいかい" text
      showFeedback('ふっかつ！🩹', false);
      addBandaid();
      Sound.SFX.join();
    } else if (state.mainLevel === 5) {
      // level 5: show a big ◯ flash — diagrams hide immediately, ◯ pops and fades
      const flash = document.getElementById('l5-correct-flash');
      flash.classList.remove('pop');
      void flash.offsetWidth; // force reflow to restart animation
      flash.classList.add('pop');
      Sound.SFX.correct();
      // only hide the diagrams if a new problem hasn't already been activated
      // (immediate-next activation may have shown the next diagram already)
      const snapIndex = colIndex;
      setTimeout(() => {
        if (state.activeProblemIndex < 0 || state.activeProblemIndex === snapIndex) {
          hideL5Diagrams();
        }
      }, 60);
    } else {
      showFeedback('せいかい！🎉', false);
      if (!state.questionHadMistake) Sound.SFX.correctHi();
      else Sound.SFX.correct();
    }
    if (state.challengeMode) {
      state.challengeCount++;
      // speed up after each correct answer — but for level 5 challenge,
      // cap the speed at ~25 correct answers and increase difficulty by
      // randomising which side the unknown □ is on instead
      const INC = 0.07;
      const SPEED_CAP_L5 = 0.9 + 25 * INC;   // ≈ 2.65 — frozen after 25 correct
      if (state.mainLevel === 5) {
        if (state.challengeSpeed < SPEED_CAP_L5) {
          // still ramping up (first 25 questions)
          state.challengeSpeed = Math.min(SPEED_CAP_L5, state.challengeSpeed + INC);
          state.timeLimitSec   = Math.max(2.8, state.timeLimitSec - 0.06);
        }
        // once capped: speed AND time limit stay fixed — only □ position / target vary
      } else {
        state.challengeSpeed = Math.min(4.0, state.challengeSpeed + INC);
        state.timeLimitSec   = Math.max(1.4, state.timeLimitSec - 0.06);
      }
      state.scrollSpeedCols = state.challengeSpeed;
      state.warningDistanceCols = state.challengeSpeed * state.timeLimitSec;
      state.retreatCols = state.warningDistanceCols;
      progressLabel.textContent = state.challengeCount + ' もん';
      updateSpeedMeter();
      // extend road when near the end
      if ((domColStart + state.cols.length) - state.scrollX < 15) challengeExtendRoad();
    } else {
      if (!hadMistake) {
        state.score += Math.round(100 / state.totalQuestions);
      }
      state.questionCount++;
      scoreLabel.textContent = state.score;
      progressLabel.textContent = `${state.questionCount} / ${state.totalQuestions}`;
    }

    // clear the timer state BEFORE setting col.solved, so that any frame()
    // running concurrently sees a clean state and won't fire triggerFall
    state.activeProblemIndex = -1;
    state.timerStart = null;
    col.solved = true;
    col.height = col.target;

    // fill missing blocks with a quick pop-in — kept almost simultaneous
    const colEl = roadStrip.children[colIndex];
    const missingBlocks = colEl.querySelectorAll('.block.missing');
    const STAGGER_TOTAL_MS = 90;
    const stepMs = missingBlocks.length > 1 ? STAGGER_TOTAL_MS / (missingBlocks.length - 1) : 0;
    missingBlocks.forEach((b, i) => {
      setTimeout(() => {
        b.classList.remove('missing', 'missing-top', 'missing-bottom');
        b.classList.add('filled-in');
      }, i * stepMs);
    });
    panel.classList.remove('show');
    timerTrack.classList.remove('show');
    hideFeedback();

    // (activeProblemIndex and timerStart already cleared above)
    state.locked = false;
    state.pendingProblemIndex = -1;

    // 次の問題への遷移:
    // 通常モード: 即時遷移（正解後すぐ次問）
    // チャレンジ全レベル: 歩行到達（穴まで歩いて近づいたら次問が出る）
    const lastQuestionDone = !state.challengeMode &&
                             state.questionCount >= state.totalQuestions;
    if (lastQuestionDone) {
      panel.classList.remove('show');
      timerTrack.classList.remove('show');
      splitDiagram.classList.remove('show');
      hideL5Diagrams();
    } else if (!state.challengeMode) {
      // 通常モード: 即時遷移
      // colIndexは絶対インデックス、cols[]はdomColStart分削除済みなので補正が必要
      const relativeColIndex = colIndex - domColStart;
      const nextRelIdx = state.cols.findIndex(
        (c, i) => i > relativeColIndex && c.isProblem && !c.solved
      );
      if (nextRelIdx >= 0) {
        // 取得した列が有効な問題列かを念のため確認
        const nextCol = state.cols[nextRelIdx];
        if (nextCol && nextCol.isProblem && !nextCol.solved &&
            nextCol.missing > 0 && nextCol.missing < nextCol.target) {
          state.correctCooldownUntil = 0;
          activateProblem(nextRelIdx + domColStart);
          return;
        }
      }
    } else {
      // チャレンジ全レベル: 道路を継ぎ足し、歩いて到達してから次問
      challengeExtendRoad();
      state.correctCooldownUntil = 0;
      return;
    }

    // fallback cooldown (reached only when there is no next problem, i.e.
    // the last question was just answered and the goal gate is ahead)
    state.correctCooldownUntil = performance.now() + 600;

    if (state.questionCount >= state.totalQuestions) {
      // All questions done — dash to the goal gate at 3× speed
      state.scrollSpeedCols = Math.max(state.scrollSpeedCols, 3.0);
    }
    // driving continues uninterrupted; car height interpolation will rise smoothly
  }

  function onWrong(col, colIndex) {
    state.questionHadMistake = true;

    // CHALLENGE: a single wrong answer ends the run
    if (state.challengeMode) {
      stopDriving();
      state.locked = true;  // prevent any new problem from activating
      state.correctCooldownUntil = performance.now() + 5000;  // long block
      state.pendingProblemIndex = -1;   // 次問pending をクリア
      state.activeProblemIndex = -1;    // アクティブ問題をリセット
      document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
      showFeedback('ざんねん！💦', false);
      Sound.SFX.wrong();
      setTimeout(() => {
        hideFeedback();
        challengeGameOver();
      }, 1000);
      return;
    }

    // normal mode: a wrong answer doesn't end the run — let the player retry
    // the same problem (this problem will score 0 even if eventually solved).
    showFeedback('ざんねん！', true);
    Sound.SFX.wrong();
    setTimeout(() => {
      document.querySelectorAll('.ans-btn').forEach(b => {
        b.classList.remove('wrong');
        b.disabled = false;
      });
      hideFeedback();
    }, 600);
  }

  function showFeedback(text, isWrong) {
    feedback.textContent = text;
    feedback.classList.toggle('wrong-bg', isWrong);
    feedback.classList.add('show');
  }
  function hideFeedback() {
    feedback.classList.remove('show');
  }

  // ---- 派手なコンフェッティ ----
  function launchConfetti(count = 60) {
    const colors = ['#ff6b9d','#ff9f40','#ffdd57','#48d890','#4fb8ff','#c879ff','#ff4757','#eccc68'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = (10 + Math.random() * 80) + 'vw';
        el.style.top  = '-12px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width  = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const dur = 1.2 + Math.random() * 1.4;
        el.style.animationDuration = dur + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), dur * 1000 + 100);
      }, i * 30);
    }
  }

  function showClear(reason) {
    panel.classList.remove('show');
    timerTrack.classList.remove('show');
    car.classList.remove('celebrating');
    const friend = document.getElementById('car-friend');
    if (friend) { friend.style.display = 'none'; friend.classList.remove('pop-in','celebrating'); }

    // save and detect new record / first clear
    const { isFirst, isNewRecord } = saveHistory(state.mainLevel, state.speedTier, state.score);

    // BGMを止めて結果音を鳴らす
    Sound.bgmStop();
    const isGoalSound = reason !== 'failed';
    if (isGoalSound && (isFirst || isNewRecord)) {
      setTimeout(() => Sound.SFX.record(), 250);
    }

    const isGoal = reason !== 'failed';
    let title = isGoal ? 'ゴール！🏆' : 'ここまでだぴぃぃ';

    // special badge HTML
    let badgeHtml = '';
    if (isGoal && isFirst) {
      badgeHtml = `<div class="first-badge">✨ はじめてのクリア！ ✨<br>すごい！よくできました！🎉</div>`;
    } else if (isGoal && isNewRecord) {
      badgeHtml = `<div class="record-badge">🏅 しんきろく！ 🏅</div>`;
    }

    const speedLabel = SPEED_LABELS[state.speedTier] || state.speedTier;
    const history = loadHistory(state.mainLevel, state.speedTier);
    const histItems = [...history]
      .sort((a, b) => b.score - a.score)
      .map((entry, i) => {
        const dateStr = formatHistoryDate(entry.date);
        const isThis = entry === history[0];
        return `<li class="${isThis ? 'this-run' : ''}"><span>${dateStr}</span><span class="hist-score">${entry.score}てん</span></li>`;
      }).join('');
    const histHtml = `
      <div class="result-history">
        <p class="result-history-title">これまでの きろく（レベル${state.mainLevel}・${speedLabel}）</p>
        <ul>${histItems || '<li style="color:#b0a89a">まだ きろくが ありません</li>'}</ul>
      </div>`;

    const SPEED_ORDER = ['A', 'B', 'C', 'D'];
    const MAX_LEVEL = 5;
    let nextLevel = state.mainLevel;
    let nextSpeed = null;
    if (isGoal) {
      const curSpeedIdx = SPEED_ORDER.indexOf(state.speedTier);
      if (curSpeedIdx < SPEED_ORDER.length - 1) {
        // same level, next speed
        nextSpeed = SPEED_ORDER[curSpeedIdx + 1];
        nextLevel = state.mainLevel;
      } else if (state.mainLevel < MAX_LEVEL) {
        // next level, slowest speed
        nextSpeed = 'A';
        nextLevel = state.mainLevel + 1;
      }
      // else: L5ばくそく — no next
    }

    const nextBtn = (isGoal && nextSpeed !== null) ? `
      <button class="big-btn" id="next-btn" style="background:linear-gradient(135deg,#48d890,#4fb8ff)!important;box-shadow:0 3px 0 #2a9a6e!important;">
        つぎへ ▶
      </button>` : '';

    const scoreClass = (isGoal && isNewRecord) ? 'score-num new-record-score' : 'score-num';
    startCard.innerHTML = `
      <h1>${title}</h1>
      ${badgeHtml}
      <p class="score-label">とくてん</p>
      <p class="score-result"><span class="${scoreClass}">${state.score}</span><span class="score-unit">てん</span></p>
      ${histHtml}
      <div class="result-btn-row">
        <button class="big-btn retry-again-btn" id="retry-again-btn">もういちど</button>
        ${nextBtn}
        <button class="big-btn retry-home-btn" id="retry-btn">トップページへ</button>
      </div>
    `;

    // wire up next button
    if (isGoal && nextSpeed !== null) {
      const _nextLevel = nextLevel;
      const _nextSpeed = nextSpeed;
      document.getElementById('next-btn').addEventListener('click', () => {
        state.mainLevel = _nextLevel;
        state.speedTier = _nextSpeed;
        startGame();
      });
    }

    // 「もう一度」ボタン: 同じレベル・スピードで再スタート
    document.getElementById('retry-again-btn').addEventListener('click', () => {
      Sound.resume();
      Sound.SFX.tap();
      if (state.challengeMode || state.wasChallenge) {
        startChallengeMode();
      } else {
        startGame();
      }
    });

    overlay.classList.remove('hidden');

    // launch confetti for special occasions
    if (isGoal && isFirst)      launchConfetti(40);
    if (isGoal && isNewRecord)  launchConfetti(80);
  }

  // restore the original start screen (level/speed select + history), and
  // refresh the history list for the currently-selected level+speed combo
  function showStartScreen() {
    startCard.innerHTML = START_CARD_HTML;
    document.querySelectorAll('.speed-btn').forEach(b => {
      const lv = parseInt(b.dataset.level, 10);
      const sp = b.dataset.speed;
      const matches = lv === state.mainLevel && sp === state.speedTier;
      b.classList.toggle('selected', matches);
      // mark cleared buttons with ⭐
      const cleared = loadHistory(lv, sp).length > 0;
      b.dataset.cleared = cleared ? 'true' : 'false';
    });
    renderHistory();
    // サウンドトグルの表示をミュート状態に同期
    const stog = document.getElementById('sound-toggle');
    if (stog) {
      const m = Sound.isMuted;
      stog.classList.toggle('off', m);
      stog.innerHTML = m ? '<span>🔇おと</span><span>オフ</span>' : '<span>🔊おと</span><span>オン</span>';
    }
    overlay.classList.remove('hidden');
  }

  window.addEventListener('resize', () => {
    if (overlay.classList.contains('hidden')) {
      applySizing();
      renderAll();
    }
  });

  // ============================================================
  // CHALLENGE MODE
  // ============================================================

  // speed meter: 6 dots (🐢 ... 🐇), 1 dot lights up every 10 correct answers.
  // Full meter = 60 correct answers. Dots go green -> orange -> red near full.
  const SPEED_DOTS = 6;
  const SPEED_METER_FULL = 60;   // 10問ごとに1段階、6段階で満タン
  function updateSpeedMeter() {
    const meter = document.getElementById('speed-meter');
    if (!meter) return;
    // floor so each step lights exactly at 10, 20, 30, 40, 50, 60
    const lit = Math.min(SPEED_DOTS, Math.floor(state.challengeCount / 10));
    meter.classList.toggle('hot', lit >= 5);
    meter.classList.toggle('max', lit >= SPEED_DOTS);
    let html = '';
    for (let i = 0; i < SPEED_DOTS; i++) {
      html += `<span class="dot${i < lit ? ' on' : ''}"></span>`;
    }
    meter.innerHTML = html;
    // 速さ段階(lit: 0〜6)に合わせてBGMテンポを段階的に上げる
    const TEMPO_BY_STAGE = [1.00, 1.08, 1.16, 1.25, 1.34, 1.44, 1.55];
    Sound.setTempo(TEMPO_BY_STAGE[lit] ?? 1.0);
  }
  // gap is always 3 — only the character speed increases
  const CHALLENGE_GAP = 3;

  function challengeMakeCol(isProb, prevMissing) {
    if (isProb) {
      const isL5 = state.mainLevel === 5;
      const l5target = isL5 ? (Math.random() < 0.5 ? 5 : 10) : state.roadHeight;
      const missing = randomMissing5(prevMissing, l5target);
      const knownIsLeft = Math.random() < 0.5;
      return {
        target: state.roadHeight,
        height: isL5 ? state.roadHeight : state.roadHeight - missing,  // L5: flat; L1-4: show hole
        missing, isProblem: true, solved: false,
        splitKnown: l5target - missing,
        l5target: isL5 ? l5target : null,
        l5style: isL5 ? L5_STYLES[Math.floor(Math.random() * L5_STYLES.length)] : null,
        knownIsLeft
      };
    }
    return { target: state.roadHeight, height: state.roadHeight,
             missing: 0, isProblem: false, solved: true };
  }

  function challengeExtendRoad() {
    // ゲームオーバー後に呼ばれても何もしない
    if (!state.challengeMode) return;

    // ---- 画面外に去った古い列をDOMとcols配列から削除してメモリを解放 ----
    // scrollXの絶対値から既削除数(domColStart)を引いた「cols内の相対位置」で判定する。
    // scrollX・activeProblemIndex等の絶対座標系は変えない。
    // cols[]へのアクセスはcolAt(absoluteIndex)ヘルパーを使う。
    const pruneUpTo = Math.floor(state.scrollX) - 5 - domColStart;
    if (pruneUpTo > 0) {
      const del = Math.min(pruneUpTo, state.cols.length - 1);
      if (del > 0) {
        for (let d = 0; d < del && roadStrip.firstChild; d++) {
          roadStrip.removeChild(roadStrip.firstChild);
        }
        state.cols.splice(0, del);
        domColStart += del;
      }
    }

    const cycle = CHALLENGE_GAP + 1;
    const base = state.cols.length + domColStart;
    let prevMissing = state.cols.filter(c=>c.isProblem).slice(-1)[0]?.missing ?? -1;
    let posInCycle = ((base - 4) % cycle + cycle) % cycle;

    // 必要最低限だけ追加: 画面右端から20列分のバッファを確保
    const targetLen = Math.ceil(state.scrollX) + 20 - domColStart;
    const addCount = Math.max(cycle * 2, targetLen - state.cols.length);
    for (let n = 0; n < addCount; n++) {
      const isProb = posInCycle === 0;
      const col = challengeMakeCol(isProb, prevMissing);
      if (isProb) prevMissing = col.missing;
      state.cols.push(col);
      roadStrip.appendChild(renderColumn(col));
      posInCycle = (posInCycle + 1) % cycle;
    }
  }

  // cols[絶対インデックス] へのアクセスヘルパー。
  // チャレンジで古い列を削除するとdomColStartがずれるので、それを補正する。
  function colAt(absoluteIndex) {
    return state.cols[absoluteIndex - domColStart];
  }

  let domColStart = 0;  // 累積削除列数

  function startChallengeMode() {
    domColStart = 0;  // DOM削除カウンタをリセット
    state.challengeMode     = true;
    state.mainLevel         = state.challengeLevel;
    state.roadHeight        = state.mainLevel === 1 ? 5 : 10;
    // level 5 challenge: start with target 5, will vary per question (use 10 as base)
    if (state.mainLevel === 5) state.roadHeight = 10;
    state.speedTier         = 'A';
    state.challengeCount    = 0;
    state.challengeSpeed    = 0.9;
    state.timeLimitSec      = 4.5;
    state.warningDistanceCols = 0.9 * 4.5;
    state.retreatCols       = state.warningDistanceCols;
    state.scrollSpeedCols   = 0.9;          // ← critical: must be set!
    state.scrollX           = 0;
    state.lastTime          = null;
    state.score             = 0;
    state.questionCount     = 0;
    state.totalQuestions    = 99999;
    state.locked            = false;
    state.activeProblemIndex = -1;
    state.timerStart        = null;
    state.correctCooldownUntil = 0;
    state.pendingProblemIndex = -1;
    state.goalColIndex      = null;
    state.goalEntered       = false;
    state.cubiePx           = null;

    overlay.classList.add('hidden');
    goalGate.classList.remove('show');
    document.getElementById('car-friend').style.display = 'none';
    document.getElementById('challenge-speed-label').style.display = 'none';
    // challenge uses a speed meter instead of the star score
    document.getElementById('score-pill').style.display = 'none';
    document.getElementById('speed-pill').style.display = 'flex';

    state.cols = [];
    roadStrip.innerHTML = '';
    applySizing();

    // flat start (4 cols)
    for (let i = 0; i < 4; i++) {
      const col = challengeMakeCol(false, -1);
      state.cols.push(col);
      roadStrip.appendChild(renderColumn(col));
    }
    // first batch of problem+flat cols
    challengeExtendRoad();

    progressLabel.textContent = '0 もん';
    scoreLabel.textContent = '';
    updateSpeedMeter();
    updateHeaderText();
    assignCharacters();
    initAnswerButtons();
    renderAll();
    startDriving();
    Sound.resume();
    Sound.setTempo(1.0);
    Sound.bgmStart();
  }

  function challengeGameOver() {
    document.getElementById('challenge-speed-label').style.display = 'none';
    state.challengeMode = false;
    state.locked = true;   // ゲームオーバー後に新たな問題が活性化しないようロックを保持
    state.pendingProblemIndex = -1;  // pending中の次問をクリア
    state.activeProblemIndex = -1;   // アクティブ問題をリセット
    state.correctCooldownUntil = performance.now() + 10000; // 長めにブロック
    Sound.bgmStop();
    const { isFirst, isNewRecord } = saveChallengeHistory(state.challengeLevel, state.challengeCount);
    if (isFirst || isNewRecord) setTimeout(() => Sound.SFX.record(), 250);
    const resultMsg = isFirst ? '🎉 はじめてのきろく！' : isNewRecord ? '🏆 さいこうきろく！' : '';
    const _challengeLevel = state.challengeLevel;
    startCard.innerHTML = `
      <h1 style="font-size:clamp(22px,6vw,32px)">ここまでだぴぃぃ</h1>
      <p class="score-label">せいかいした もんだいは</p>
      <p class="score-result"><span class="score-num">${state.challengeCount}</span><span class="score-unit">もん</span></p>
      ${resultMsg ? `<p style="font-size:1.1em;color:#e84d7a;font-weight:800;margin:4px 0 10px;">${resultMsg}</p>` : ''}
      <div class="result-btn-row">
        <button class="big-btn retry-again-btn" id="chal-retry-again-btn">もういちど</button>
        <button class="big-btn retry-home-btn" id="retry-btn">トップページへ</button>
      </div>`;
    // 「もう一度」: 同じチャレンジレベルで再スタート
    document.getElementById('chal-retry-again-btn').addEventListener('click', () => {
      Sound.resume();
      Sound.SFX.tap();
      state.challengeLevel = _challengeLevel;
      state.challengeSelected = true;
      startChallengeMode();
    });
    overlay.classList.remove('hidden');
  }

  // challenge level select / start handlers are delegated via the
  // startCard click listener above, so they survive start-card re-render.

  // ============================================================

  // keyboard shortcut: number keys 1-9 act as answer buttons
  document.addEventListener('keydown', (e) => {
    // only active during a question (state.locked = true means a problem is open)
    if (!state.locked) return;
    const n = parseInt(e.key, 10);
    if (isNaN(n) || n < 1) return;
    // find the answer button with this number and click it
    const btns = document.querySelectorAll('.ans-btn');
    for (const btn of btns) {
      if (parseInt(btn.textContent, 10) === n && !btn.disabled) {
        btn.click();
        break;
      }
    }
  });

  // initial sizing for start screen preview
  applySizing();
  renderHistory();
  // mark already-cleared buttons on the initial start screen
  document.querySelectorAll('.speed-btn').forEach(b => {
    const lv = parseInt(b.dataset.level, 10);
    const sp = b.dataset.speed;
    b.dataset.cleared = loadHistory(lv, sp).length > 0 ? 'true' : 'false';
  });
})();
</script>
</body>
</html>
